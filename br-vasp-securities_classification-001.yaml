interpretation_note: 'Provenance: corridor fieldwork. Brazilian C4 analogue of the US Reves/§404 securities-classification
  spine — but Brazil''s contribution is token classification + asset curation (Parecer 40 + Res 520), NOT a developed
  routing-into-tokenised-fund story; the CVM-175 tokenised-fund routing analysis is net-new work that would feed
  the ''Reves'' Fourth Factor / Routing Across Six Jurisdictions'' paper.


