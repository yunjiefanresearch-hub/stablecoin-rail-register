id: br-vasp-securities_classification-001
jurisdiction: BR
authority: CVM (securities-like tokens); BCB (virtual-asset payments/custody)
instrument_type: tokenized_security
instrument_label_local: token caracterizado como valor mobiliário
dimension: securities_classification
constraint_ref: C4
requirement_summary: Lei 14.478/2022 and Decreto 11.563/2023 preserve CVM jurisdiction over virtual assets that
  are securities (valores mobiliários) and over investor-protection issues; the functional securities-vs-virtual-asset
  distinction follows CVM Parecer de Orientação 40. A token with collective-investment / securities characteristics
  is regulated by the CVM, not (only) by the BCB SPSAV regime. Brazilian investment funds — the natural routing
  destination — are governed by Resolução CVM 175. A USD-referenced payment stablecoin is treated by the BCB as
  a foreign-exchange instrument rather than a security.
requirement_structured:
  securities_authority: CVM
  classification_instrument: CVM Parecer de Orientação 40
  funds_framework: Resolução CVM 175
  bcb_view_of_usd_stablecoin: foreign-exchange instrument (not a security)
