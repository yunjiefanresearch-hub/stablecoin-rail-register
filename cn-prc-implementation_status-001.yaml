id: cn-prc-implementation_status-001
jurisdiction: CN
authority: PBOC; CAC; CSRC; SAFE
instrument_type: other
instrument_label_local: 稳定禁止 (stable prohibition)
dimension: implementation_status
requirement_summary: 'The regime is a stable prohibition with no scheduled formal rule change. Key milestones: the
  2017 ICO ban (94 公告); the Data Security Law (1 Sep 2021); the reaffirmed comprehensive prohibition extended to
  offshore exchanges (24 Sep 2021); PIPL (1 Nov 2021); the 22 March 2024 cross-border data Provisions; the 2025
  Hong Kong application window in which PRC-connected groups (Ant, JD, and state-owned banks) applied or expressed
  interest; and the 10 April 2026 HK first-license cohort, which excluded all PRC-connected applicants, private
  and state alike.'
requirement_structured:
  '2017': ICO ban (94 公告)
  2021_dsl: Data Security Law (1 Sep)
  2021_prohibition: comprehensive prohibition reaffirmed (24 Sep)
  2021_pipl: PIPL (1 Nov)
  '2024': cross-border data Provisions (22 Mar)
  '2025': HK application window; Oct 2025 PBOC/CAC guidance; Ant/JD suspend
  '2026': 10 Apr HK first cohort excludes all PRC-connected applicants
status: in_force
effective_date: '2021-09-24'
