id: sg-scs-redemption-001
jurisdiction: SG
authority: MAS
instrument_type: fiat_referenced_stablecoin
instrument_label_local: single-currency stablecoin (SCS)
dimension: redemption
requirement_summary: SCS holders are entitled to redemption at par value within 5 business days of a valid request,
  with no unreasonable fees or conditions, and customer assets are held under a statutory trust.
