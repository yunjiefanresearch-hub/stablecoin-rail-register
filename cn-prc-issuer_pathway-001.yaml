id: cn-prc-issuer_pathway-001
jurisdiction: CN
authority: PBOC; CAC; MIIT; SAFE
instrument_type: other
instrument_label_local: 无合法境内发行路径 (no lawful domestic issuance pathway)
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: 'There is no domestic stablecoin issuance pathway. The 2017 ICO Notice (94公告) policy continues,
  and the 2026 Notice (银发〔2026〕42号, which repealed the 2021 Notice) treats token issuance and virtual-currency business
  activity as prohibited, upgrading the banned act from token-offering financing to issuing virtual currency. The
  live regulatory questions for PRC-connected groups therefore concern the indirect pathway through Hong Kong and
  the cross-border data, capital, and disclosure constraints that condition it, not a domestic licence. The behavioural
  boundary observed in 2025 tracks a private/state distinction: private internet groups (Ant, JD) applied for HK
  licences and then withdrew in October 2025; state-linked banks expressed interest and paused; and no PRC-affiliated
  applicant received a licence in the April 2026 first round.'
requirement_structured:
  domestic_pathway: none
  prohibition_instruments:
  - 2017 ICO Notice (94 公告)
  - 2021 PBOC virtual-currency framework
  observed_boundary: private vs state issuance, not PRC-connected vs non-PRC-connected
status: in_force
effective_date: '2021-09-24'
source:
  primary: 《关于进一步防范和处置虚拟货币等相关风险的通知》(银发〔2026〕42号, 6 Feb 2026; repealed 银发〔2021〕237号); 2017 ICO Notice (94公告)
  pinpoint: 银发〔2026〕42号 (virtual-currency-related business activities in the PRC are illegal financial activities,
    strictly prohibited; the prohibited act is upgraded from '代币发行融资' (token-offering financing, 2021) to '发行虚拟货币'
    (issuing virtual currency), now reaching non-fundraising / airdrop / utility issuance)
  url: https://www.csrc.gov.cn/csrc/c100028/c7614318/content.shtml
secondary:
- citation: Fan, Multi-Jurisdiction Stablecoin Compliance Matrix v0.9.6 (June 2026), §Mainland China (Statutory
    Framework; Indirect pathway) [re-pinned from v0.9.3]
interpretation_note: 'Provenance: transcribed from the author''s Compliance Matrix (re-pinned to v0.9.6; originally
  v0.9.3). The Ant/JD October 2025 suspension and the absence of any PRC-affiliated licensee in the April 2026 HK
  cohort are the empirical anchors for the ''stable prohibition'' characterization.


  [v0.9.5 verification] NATIVE-LANGUAGE VERIFICATION (Chinese): operative-instrument citation updated to 银发〔2026〕42号,
  which repealed the 2021 Notice and broadened the issuance prohibition. No domestic issuance pathway exists; CN
  stays the prohibition pole.'
