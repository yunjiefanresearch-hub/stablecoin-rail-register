interpretation_note: 'Provenance: corridor fieldwork. Analytically this is a THIRD monetary-sovereignty model distinct
  from the EU''s means-of-exchange caps (MiCA Art. 23 sets the 1m-transactions / EUR 200m-per-day issuance brake
  for asset-referenced tokens; for non-euro e-money tokens — the category a USD coin falls in — Art. 58(3) extends
  the equivalent restriction; verified against the MiCA/EUR-Lex text) and from PRC prohibition — the ''FX-channeling
  + per-operation cap'' model. Strongest argument that Brazil is not redundant with the existing six matrix jurisdictions
  (Compliance Matrix Pattern 2). C7-mapping caveat: the structural EFFECT is comparable to the EU''s monetary-sovereignty
  mechanism, but the stated MOTIVE differs — BCB frames the measure primarily around FX-market integrity, traceability
  and balance-of-payments capture, with dollarization also cited as a concern, not the EU''s explicit euro-protection
  rationale; the comparison is by effect, not legislative intent.


