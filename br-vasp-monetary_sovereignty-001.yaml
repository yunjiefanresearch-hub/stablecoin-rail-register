id: br-vasp-monetary_sovereignty-001
jurisdiction: BR
authority: BCB
instrument_type: fiat_referenced_stablecoin
instrument_label_local: ativo virtual referenciado em moeda estrangeira
dimension: monetary_sovereignty
constraint_ref: C7
requirement_summary: 'Brazil does not impose a MiCA-style volume cap on the use of non-domestic-currency (e.g. USD)
  stablecoins as a means of exchange. Instead it asserts monetary-sovereignty control through three mechanisms:
  (i) reclassifying cross-border virtual-asset payments as foreign-exchange (câmbio) operations under Lei 14.286/2021
  (Res BCB 521), bringing them into the FX / balance-of-payments perimeter; (ii) per-operation caps on those FX-classified
  operations (USD 100k SPSAV / USD 500k FX-FI where the counterparty is not FX-authorised); and (iii) closing the
  eFX retail rail''s external settlement leg to virtual assets (Res BCB 561), so mass low-value flows cannot settle
  abroad in crypto. Context: estimates of the stablecoin share of Brazilian crypto activity vary by metric and period
  — BCB officials have cited roughly 90% of crypto flows, while some market trackers report nearer two-thirds (~67%)
  of crypto volume; either way stablecoins dominate, which motivated the FX framing. [share figure to be locked
  to a single dated source before citing as primary].'
requirement_structured:
  volume_cap_style: none (no MiCA-style means-of-exchange cap)
  control_mechanism:
  - FX reclassification (Res 521)
  - per-operation caps
  - eFX crypto exclusion (Res 561)
status: in_force
effective_date: '2026-02-02'
