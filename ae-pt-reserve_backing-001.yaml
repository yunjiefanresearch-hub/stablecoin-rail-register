requirement_summary: 'Onshore: 100% backing, segregated in UAE banks. The bank-subsidiary option requires at least
  50% cash plus UAE government bonds / CBUAE monetary bills. Free-zone frameworks impose their own reserve requirements
  (e.g., the ADGM FRT framework requires high-quality liquid reserves).'
