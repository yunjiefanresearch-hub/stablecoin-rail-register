requirement_summary: 'IN FORCE: AML registration under the amended Money Laundering Control Act and the VASP Registration
  Regulations (since 30 November 2024), requiring virtual-asset service providers to register and comply with AML/CFT
  obligations; the FATF travel rule applies. This is the only operative layer of the Taiwan regime.'
