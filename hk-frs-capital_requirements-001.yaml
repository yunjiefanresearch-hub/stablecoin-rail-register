dimension: capital_requirements
constraint_ref: C2
requirement_summary: HK$25 million minimum paid-up share capital (or currency equivalent), with HKMA empowered to
  require more based on business plan; HK$3 million minimum liquid capital; and excess liquid capital equivalent
  to at least 12 months of operating expenses. The HK$25m threshold, combined with the HK-incorporation-or-authorised-institution
  requirement, effectively limits applicants to banks and JV-backed large corporates.
