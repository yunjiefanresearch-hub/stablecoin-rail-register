    Data Treatment) [re-pinned from v0.9.3]
interpretation_note: 'Provenance: transcribed from the author''s Compliance Matrix (re-pinned to v0.9.6; originally
  v0.9.3). This is the one PRC constraint that binds firms with no PRC entity affiliation: when their KYC/onboarding
  flows touch PRC-resident personal data, the PIPL and DSL gates apply regardless of where the stablecoin is issued.


