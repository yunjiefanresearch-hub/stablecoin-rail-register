id: cn-prc-cross_border_data-001
jurisdiction: CN
authority: CAC; PBOC
instrument_type: other
instrument_label_local: 出境数据 (cross-border data); wallet KYC / merchant onboarding data
dimension: cross_border_data
constraint_ref: C6
requirement_summary: 'Even where issuance is prohibited, stablecoin-related personal data (wallet KYC and merchant-onboarding
  data tied to PRC residents) falls within PIPL outbound-transfer scope and is the binding constraint that reaches
  non-PRC-affiliated cross-border firms. PIPL (effective 1 Nov 2021) requires that any cross-border transfer of
  personal information satisfy one of three gates: (a) a CAC security assessment, (b) personal-information-protection
  certification by a CAC-approved body, or (c) a CAC Standard Contract. The Data Security Law (DSL, effective 1
  Sep 2021) subjects cross-border transfer of ''important data'' to security review. The 22 March 2024 Provisions
  on Promoting and Regulating Cross-Border Data Flows raise the thresholds for mandatory security assessment, giving
  partial relief for routine business data (e.g. HR and contract-performance data). Free Trade Zone negative lists
  (Shanghai, Beijing, Hainan, and others) provide additional zone-specific relief.'
requirement_structured:
  pipl_transfer_gates:
  - CAC security assessment
  - CAC-approved certification
  - CAC Standard Contract
  dsl_important_data: cross-border transfer subject to security review
  march_2024_provisions: raises mandatory-assessment thresholds; partial relief for routine business data
  ftz_relief: zone-specific negative lists (Shanghai/Beijing/Hainan/etc.)
  reaches_non_prc_firms: true
status: in_force
effective_date: '2021-11-01'
source:
  primary: Personal Information Protection Law (PIPL, eff. 1 Nov 2021); Data Security Law (DSL, eff. 1 Sep 2021);
    CAC Provisions on Promoting and Regulating Cross-Border Data Flows (22 Mar 2024)
  pinpoint: PIPL three-gate outbound transfer; DSL important-data review; March 2024 threshold relief; FTZ negative
    lists
secondary:
