id: jp-epi-regulatory_authority-001
jurisdiction: JP
authority: FSA (Financial Services Agency)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: Electronic Payment Instrument (EPI)
dimension: regulatory_authority
requirement_summary: Fiat-referenced, par-redeemable stablecoins are Electronic Payment Instruments under the Payment
  Services Act. The 2022 amendment took effect 1 June 2023 and created the category; Act No. 66 of 2025 (in force
  June 2025, with implementing cabinet orders to follow) relaxed the trust-type backing rule. The FSA is the single
  supervisor of issuers and intermediaries; Local Finance Bureaus administer funds-transfer and intermediary registrations
  under FSA delegation.
