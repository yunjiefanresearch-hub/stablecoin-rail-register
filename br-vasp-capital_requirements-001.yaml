id: br-vasp-capital_requirements-001
jurisdiction: BR
authority: CMN/BCB (joint); BCB
instrument_type: other
instrument_label_local: sociedade prestadora de serviços de ativos virtuais (SPSAV)
dimension: capital_requirements
constraint_ref: C2
requirement_summary: 'Minimum capital for SPSAVs is set by Resolução Conjunta CMN/BCB nº 14/2025 and Res BCB 517/2025
  (both 3 Nov 2025), scaled by activity/modality. Per the BCB''s 10 Nov 2025 press conference the range is R$10,800,000–R$37,200,000
  (ANBIMA: ''VASPs must now hold R$10.8 million to R$37.2 million in minimum capital''). Res BCB 519/520 do not
  hard-code a capital figure; they cross-refer to this methodology. FX-authorised institutions (banks, DTVM/CTVM,
  corretoras de câmbio) remain subject to their existing prudential regimes. IMPORTANT: the frequently-cited R$1m–3m
  (~USD 181,500–544,500) range was the REJECTED 2024 public-consultation (CP 109/110) proposal, NOT the binding
  regime.'
