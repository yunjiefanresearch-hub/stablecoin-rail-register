corridor_id: jp-us-jpy-usd-settlement
name: Japan -> United States (JPY->USD settlement)
schema: corridor/v3-directed-edge
origin: JP
destination: US
direction: directed
currencies: JPY -> USD
feasibility_class: Category II (comparability determination required)
compatibility_category: I/II
compatibility_pair: JP-US
divergence:
  kind: interaction_sets
  against_pair: JP-US
  pair_interaction_sets:
  - A
  - C
  - E
  - F
  edge_interaction_sets: &id001
  - A
  - C
  reason: Directed-edge operative interaction sets (Corridor Atlas v0.2.3 §5, read at the destination
    inbound gate for THIS direction) differ from the undirected pairwise sets (Architecture §5.14). The
    Atlas generalizes the §5.12/§5.14 undirected pairs into directed edges and re-derives the operative
    interaction sets per direction; the compatibility CATEGORY agrees, the interaction-set list may differ
    by direction. This divergence is declared, not silent.
archetypes:
- RC
- SC
- TC
- DC
interaction_sets: *id001
infrastructure_overlap: Project Agora (shared Western wholesale-settlement experimental path)
inbound_mechanism:
  test: GENIUS Act §18 comparability determination
  detail: Unilateral Treasury comparability determination (on SCRC recommendation) + OCC registration
    + US-held reserves; none granted to date.
  administrator: US Treasury (Stablecoin Certification Review Committee) / OCC
note: 'The asymmetric mirror. A yen Electronic Payment Instrument (issued by a bank, registered funds-transfer
  provider, or trust bank) is freely exportable, but entering the US it meets the §18 comparability gate.
  No comparability determination has been made for any jurisdiction including Japan, so the corridor is
  Category II in this direction too — but for a different reason than inbound: there the channel is the
  gate, here the comparability determination is.'
source:
  primary: Fan, Cross-Border Digital-Finance Corridor Atlas v0.2.3 (June 2026), §5.19 (Japan -> United
    States)
  secondary: 'Fan, Cross-Border Stablecoin Architecture v3 (Twelve Jurisdictions, June 2026), §5.14 (US
    x JP: Category I/II hybrid)'
valid_as_of: 2026-06
evidence_tier: firm_summary
version_added: 0.5.0
