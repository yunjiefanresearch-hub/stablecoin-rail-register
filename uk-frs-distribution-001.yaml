id: uk-frs-distribution-001
jurisdiction: UK
authority: FCA; HM Treasury
instrument_type: fiat_referenced_stablecoin
instrument_label_local: UK qualifying stablecoin (UKQS)
dimension: distribution
constraint_ref: C8
requirement_summary: Offshore firms 'involved' in a sale of a cryptoasset to a UK consumer are within territorial
  scope. UKQS transactions (in UKQS only) are carved out from the financial-promotions regime, except for lending
  and borrowing arrangements. HM Treasury's 21 April 2026 draft amendment SI signals intent to bring stablecoin
  payments using UKQS-authorised firms into regulated payment services (consultation closed 22 May 2026).
requirement_structured:
