id: br-vasp-custody-001
jurisdiction: BR
authority: BCB
instrument_type: other
instrument_label_local: ativo virtual (custódia)
dimension: custody
constraint_ref: C2
requirement_summary: 'Res BCB 520 requires mandatory patrimonial segregation: client funds — both fiat and virtual
  assets — must be fully segregated from the SPSAV''s own funds, held in accounts/wallets distinct from corporate
  treasury, demonstrable beyond accounting records. Custody may be outsourced to a licensed custodian, but regulatory
  accountability cannot be transferred. (Sources also report a limited own-asset liquidity carve-out and conditions
  for using foreign custodians; the specific percentage and the foreign-custodian conditions remain to be confirmed
  against the resolution text.)'
requirement_structured:
  client_fiat: segregated from provider funds
  client_virtual_assets: wallets distinct from provider own-operation wallets
  outsourcing: permitted to licensed custodian; accountability not transferable
  own_asset_liquidity_carveout_pct: reported ~5% — confirm
status: in_force
effective_date: '2026-02-02'
source:
  primary: Res BCB 520/2025 — patrimonial segregation (segregação patrimonial)
  url: https://www.bcb.gov.br/estabilidadefinanceira/exibenormativo?tipo=Resolução BCB&numero=520
  pinpoint: 'Res BCB 520/2025 (patrimonial segregation: client funds in individualised payment/deposit accounts;
    client virtual assets in segregated wallets; foreign-custodian conditions — home-country authorisation/supervision,
    Brazil representative, enforceable guarantees, formal segregation of Brazilian clients'' assets)'
secondary:
- citation: BDO, Brazil — Central Bank Unveils Regulatory Framework (16 Feb 2026)
  url: https://www.bdo.global/en-gb/insights/tax/world-wide-tax/brazil-central-bank-unveils-regulatory-framework-for-the-virtual-asset-market
- citation: Fystack, Brazil's VASP 2026 — Custody (22 Apr 2026)
  url: https://fystack.io/blog/brazils-vasp-2026-what-stablecoin-payment-and-remittance-operators-need-to-prepare-for-custody
interpretation_note: 'Provenance: corridor fieldwork. Core segregation rule firm-corroborated; the 5% own-asset
  carve-out and the foreign-custodian conditions (relevant to the HK/offshore custody leg) are single-source and
  remain to be confirmed against Res 520 text. NB: ''MPC/HSM key management'' appears only in a custody-vendor blog
  (Fystack); Res 520''s security requirement is technology-neutral (a cybersecurity policy under the SPSAV governance/internal-controls
  chapter; Art. 88 is the separate authorisation adjustment-period provision, not a key-management mandate) — do
  not assert MPC/HSM.


  [v0.9.5 verification] NATIVE-LANGUAGE VERIFICATION (Portuguese): confirmed against the official BCB text. The
  Lei 14.478/2022 framework as implemented by Res BCB 519/520/521 (in force 2 Feb 2026) is enacted law, so this
  cell is promoted to resolution_text.'
interpretive_flag:
  tension: Statutory (vs resolution-level) asset segregation between VASPs and users is the subject of PL 4.932/2023,
    under discussion in Congress.
  resolution_channel: Federal legislation (PL 4.932/2023)
