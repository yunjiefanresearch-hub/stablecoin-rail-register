id: ch-frs-issuer_pathway-001
jurisdiction: CH
authority: FINMA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: stablecoin (Banking Act; bank-guarantee or licensed-institution pathway)
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: 'Two issuer pathways. Pathway 1 (licensed institution): an issuer holding a banking licence,
  or a FinTech licence under Art. 1b of the Banking Act, may issue stablecoins as a licensed institution. Pathway
  2 (bank default-guarantee exemption): a non-bank issuer avoids the deposit-taking prohibition by securing a default
  guarantee (Bankengarantie) from a Swiss bank covering the deposited funds; under Banking Ordinance Art. 5(3)(f)
  funds covered by such a guarantee are not deposits, so the issuer is not engaged in unauthorized deposit-taking.
  The entire non-bank issuance market runs through this single textual aperture.'
requirement_structured:
  pathway_1: banking licence or FinTech licence (Banking Act Art. 1b)
  pathway_2: non-bank issuer under a Swiss bank default guarantee (Bankengarantie); BankO Art. 5(3)(f) excludes
    guaranteed funds from 'deposit'
  market_structure: entire non-bank market runs through the bank-guarantee exemption
status: in_force
