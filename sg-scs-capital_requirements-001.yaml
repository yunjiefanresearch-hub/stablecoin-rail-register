id: sg-scs-capital_requirements-001
jurisdiction: SG
authority: MAS
instrument_type: fiat_referenced_stablecoin
instrument_label_local: single-currency stablecoin (SCS)
dimension: capital_requirements
constraint_ref: C2
requirement_summary: An SCS issuer must hold base capital of at least S$1 million or 50% of annual operating expenses,
  whichever is higher, plus liquid assets sufficient for an orderly wind-down. DTSP licensees (where granted) face
  a separate S$250,000 base-capital requirement, a S$10,000 annual licence fee, a Singapore-based compliance officer,
  and annual penetration testing.
requirement_structured:
  base_capital: max(S$1,000,000 ; 50% of annual operating expenses)
  wind_down: liquid assets sufficient for orderly wind-down
  dtsp_base_capital: S$250,000 + S$10,000 annual fee + SG compliance officer + annual pen-test
