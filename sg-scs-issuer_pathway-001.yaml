id: sg-scs-issuer_pathway-001
jurisdiction: SG
authority: MAS
instrument_type: fiat_referenced_stablecoin
instrument_label_local: single-currency stablecoin (SCS)
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: The MAS Single-Currency Stablecoin (SCS) framework applies only to stablecoins pegged
  to the Singapore Dollar or any G10 currency and issued in Singapore; tokens pegged to other assets or
  issued offshore stay under the general Digital Payment Token regime and may not use the 'MAS-regulated
  stablecoin' label. Non-bank SCS issuers with circulation above S$5 million must hold a Major Payment
  Institution (MPI) licence; those below are exempt from the framework but cannot use the label. Banks
  are exempt from the PSA licence requirement and may issue under their banking framework. Issuers must
  be incorporated in Singapore.
requirement_structured:
  peg_scope: SGD or any G10 currency, issued in Singapore
  mpi_threshold: circulation > S$5,000,000 requires MPI licence
  below_threshold: exempt but no 'MAS-regulated' label
  banks: exempt from PSA licence
  incorporation: must be incorporated in Singapore
status: transitional
