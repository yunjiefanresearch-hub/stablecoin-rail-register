dimension: cross_border_data
constraint_ref: C6
requirement_summary: 'Res BCB 521 integrates authorised SPSAVs'' virtual-asset international payments and transfers
  into the Brazilian foreign-exchange (câmbio) market, regulating the Foreign Exchange Law (Lei 14.286/2021). In
  scope: international payment/transfer with virtual assets; settlement of international card obligations; transfers
  to/from self-hosted wallets; and purchase/sale/exchange of fiat-referenced virtual assets. Each operation carries
  a per-operation cap that binds when the foreign counterparty is NOT authorised to operate in the Brazilian FX
  market: USD 100,000 for an SPSAV and USD 500,000 for an FX-authorised institution (bank / DTVM / CTVM / corretora
  de câmbio). Operations require purpose classification under BCB FX codes, identification/traceability of parties
  (KYT), and identification of self-hosted-wallet owners; cash settlement is prohibited.'
requirement_structured:
  per_operation_cap_usd:
    spsav: 100000
    fx_authorised_institution: 500000
  cap_trigger: foreign counterparty NOT BCB-FX-authorised
  fx_law_basis: Lei 14.286/2021 (legal authority); câmbio-inclusion via Art. 76-A inserted into Res 277/2022 by
    Res 521
  cash_settlement: prohibited
