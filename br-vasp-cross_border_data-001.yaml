interpretation_note: 'Provenance: corridor fieldwork, corroborated to rule level across multiple firm sources. For
  a USD-stablecoin B2B settlement the foreign counterparty is typically not BCB-FX-authorised, so the cap bites;
  above it the flow reverts to traditional câmbio. The FX hook is Lei 14.286/2021 (not the Virtual-Assets Law 14.478/2022);
  the operative câmbio-classification provision is Art. 76-A, which Res 521 inserts into Res 277/2022 (new Título
  VIII-A) — Art. 76-A is a resolution provision, not an article of Lei 14.286 (confirmed against the Res 521 DOU
  text, Jun 2026).


  [v0.9.5 verification] Lei 14.478/2022 is enacted framework law (binding status recorded); original-language text
  not line-verified in this pass, so the cell stays firm_summary.'
