requirement_summary: 'Phase-1 in force, Phase-2 pending. Milestones: Virtual Asset User Protection Act in force
  (19 Jul 2024); a Digital Asset Basic Act plus three stablecoin-specific bills before the National Assembly Political
  Affairs Committee (정무위) — as of late Apr 2026 they remained in the subcommittee (소위), with a full-committee session
  around mid-May 2026; a second-half-2026 passage goal described as uncertain, delayed by the won-stablecoin issuer-eligibility
  (51%) dispute (the Bank of Korea favouring a bank-majority consortium) and the June 2026 local elections / committee
  reconstitution.'
