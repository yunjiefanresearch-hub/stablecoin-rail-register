id: ae-pt-distribution-001
jurisdiction: AE
authority: CBUAE / free-zone regulators
instrument_type: payment_stablecoin
instrument_label_local: Payment Token (Dirham Payment Token / Foreign Payment Token)
dimension: distribution
constraint_ref: C8
requirement_summary: 'The CBUAE channel restriction is the distribution-side constraint: foreign payment tokens
  are excluded from the general-payments channel and may be accepted only to buy virtual assets or derivatives.
  Free-zone issuers cannot issue AED tokens and are carved out of the onshore payment perimeter. There is no aggregate
  volume cap.'
requirement_structured:
  channel_restriction: foreign tokens excluded from general payments (VA/derivative purchases only)
  free_zone_carve_out: cannot issue AED tokens; outside onshore payment perimeter
  aggregate_cap: none
status: in_force
