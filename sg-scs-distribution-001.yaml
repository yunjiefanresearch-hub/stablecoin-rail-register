instrument_type: fiat_referenced_stablecoin
instrument_label_local: single-currency stablecoin (SCS)
dimension: distribution
constraint_ref: C8
requirement_summary: The 'MAS-regulated stablecoin' label is restricted to SCS-framework-compliant issuers; misrepresenting
  a token as MAS-regulated carries financial penalties or imprisonment and placement on the MAS Investor Alert List.
  Retail consumer protections prohibit high-risk activities such as lending or staking using stablecoins, and foreign-issued
  stablecoins remain DPTs under the general regime.
