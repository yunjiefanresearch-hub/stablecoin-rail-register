# --------------------------------------------------------------------------- #
# POST-VERIFICATION NOTES (v0.3.1) — added after the primary-source pass:
#   - Caps USD 100k (SPSAV) / USD 500k (FX-FI), binding when the foreign counterparty
#     is NOT BCB-FX-authorised: CONFIRMED (Cescon, BDO, Global Legal Insights, Conduit).
#   - Algorithmic-stablecoin prohibition + fiat/public-debt-only reserves: CONFIRMED (GLI).
#   - Monthly BCB reporting from 4 May 2026 = Res 521 Art. 82-A (information per "Anexo
#     II-A"). CORRECTION: the official schedule label in the resolution text is "Anexo
#     II-A" — Res 521 Art. 82-A requires sending "as informações constantes do Anexo II-A"
#     and appends "ANEXO II-A À RESOLUÇÃO BCB Nº 277/2022" (confirmed against the Res 521
#     DOU text). "DeCripto" does NOT appear in the resolution; it is a future Receita
#     crypto-reporting label (current Receita crypto reporting is IN 1888) and should not
#     be presented as the BCB return name — Anexo II-A is the in-text label to keep.
#   - "MPC/HSM" stays OUT: it appears only in a custody-vendor blog; Res 520's security
#     requirement is technology-neutral (a cybersecurity policy required as part of the
#     SPSAV governance/internal-controls chapter; the Art. 88 transition provision then
#     gives existing operators the adjustment window to come into compliance).
#   - IOF: the Res 521 câmbio classification CREATES the fato gerador (taxable event) for
#     stablecoin FX operations, but IOF does NOT yet apply — the BCB regulates câmbio,
#     while the power to levy the tax is the Receita Federal's, and as of Jun 2026 the
#     Receita has published NO norm bringing collection into force. A Min. da Fazenda /
#     Receita proposal would extend IOF-Câmbio 3.5% to stablecoin purchases but is still
#     in public-consultation limbo (no defined date); a competing 'private foreign
#     currency' (1.1%) characterisation is also open. GENUINELY UNRESOLVED — kept on the
#     watch_list, not asserted as in force. (Aligns with the Matrix/Architecture, which
#     correctly state IOF as unresolved.)
#   - Securities axis: BCB/CVM split confirmed; the functional taxonomy is CVM Parecer de
#     Orientação 40; Brazilian funds (routing destination) under Resolução CVM 175.
#   - eFX retail rail is itself capped at USD 10k/operation (Res 561); Nomad / Braza Bank
#     are the named stablecoin-settlement targets.
