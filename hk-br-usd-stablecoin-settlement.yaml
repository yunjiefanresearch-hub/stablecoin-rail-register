# =============================================================================
# Cross-Border Stablecoin Register — Corridor record (accuracy-corrected)
# hk-br-usd-stablecoin-settlement  ·  schema v2  ·  proposed for v0.3.x
#
# This file takes the prior "rewritten/verified" corridor and applies the
# corrections surfaced by an independent primary-source pass (Jun 2026).
#
# CORRECTIONS APPLIED (vs the prior rewrite):
#   [C-1] ★ HK leg factual error — "Anchorpoint's USD-pegged FRS" was WRONG.
#         Anchorpoint issues HKDAP ("HKD At Par"), an HKD-referenced FRS, NOT USD.
#         Both first-cohort licences (FRS01 Anchorpoint, FRS02 HSBC, 10 Apr 2026)
#         are HKD-referenced; HKMA has signalled no near-term USD-pegged path.
#         => There is NO licensed HK USD FRS. The only live HK route for a USD coin
#            is offshore non-HKD FRS -> permitted offeror -> professional investor.
#         This also reconciles the corridor with the register's own (correct)
#         record hk-frs-issuer_pathway-001 and with Compliance Matrix v0.9.3.
#         Net effect: the error's removal SHARPENS the HK eligibility constraint.
#         src: Standard Chartered press release (10 Apr 2026, "HKDAP i.e. HKD At Par");
#              GL Insight 22 May 2026 ("both required to issue HKD-referenced ... no
#              path to dollar-pegged issuance").
#   [C-2] BR FX hook — added Lei 14.286/2021 (Foreign Exchange Law), the statute
#         Res 521/Res 561 actually regulate. The stablecoin-as-FX classification is
#         Art. 76-A — NB this is a provision INSERTED INTO Resolução BCB nº 277/2022
#         by Res 521 (new "Título VIII-A"), NOT an article of Lei 14.286/2021. The
#         LEGAL authority is Lei 14.286 (recital cites arts. 2-6, 10, 14, 15, 18) read
#         with Art. 7, V of Lei 14.478/2022 + Decreto 11.563/2023. The prior version
#         cited only Lei 14.478/2022 (the Virtual-Assets Law), which underpins 519/520
#         but is NOT the FX-classification basis.
#         [accuracy-corrected Jun 2026 — primary-source pass against the Res 521 DOU text]
#   [C-3] watch_list de-conflated — the two "2026-10-30" deadlines belong to DIFFERENT
#         regimes (VASP non-authorised-provider prohibition under 519/520 vs eFX-
#         modality Unicad registration under Res 561 Art 56-A). Added the separate
#         eFX-provider authorisation deadline 2027-05-31 (Res 561 Art 56-B).
#   [C-4] IOF sharpened — the FX classification (Res 521) CREATES the fato gerador, but
#         IOF is not yet levied: collection is the Receita Federal's competence and no
#         Receita norm is in force (Jun 2026). An active Receita/Min. Fazenda consultation
#         proposes IOF-Câmbio 3.5% on stablecoin purchases, with a competing BCB 'private
#         foreign currency' (1.1%) characterisation. Genuinely unresolved, so kept on the
#         watch_list but no longer left as a bare "pending".
#   [C-5] value-adds folded in — (a) eFX is itself capped at USD 10k/op (Res 561),
#         which hard-confirms "eFX was never the B2B rail"; (b) Res 520 foreign-
#         custodian rules (directly relevant to the HK/offshore custody leg);
#         (c) CVM/BCB jurisdictional split as the Brazilian C4 securities-perimeter
#         analogue; (d) Res 520 reserve-asset definition (fiat + same-government
#         bonds) for the auditable-reserve requirement; (e) Res 520 Art 64+ as the
#         asset-curation pinpoint.
#
# STANDING RULE (METHODOLOGY.md) — TWO EVIDENCE TIERS:
#   Tier 1 (well-corroborated; agreed across multiple independent firm/practitioner
#     sources and consistent with the statutory structure): the resolutions' existence
#     and dates; the USD 100k/500k per-operation caps and their not-FX-authorised-
#     counterparty trigger; the algorithmic-stablecoin prohibition + fiat/public-debt
#     reserves; the biennial independent audit; the eFX external-leg crypto ban + USD
#     10k cap; IOF-Cambio 3.5%.
#   Tier 2 (firm-summary only — author must confirm against the official DOU/BCB
#     normativo): the specific article numbers and labels — Res 520 Art. 4 / 44 /
#     88 / 89 and Art. 64+, Res 521 Art. 82-A and the 'Anexo II-A' label, the
#     Res 277-inserted Art. 76-A (the câmbio-inclusion hook), Res 561 Art. 56-A / 56-B,
#     and the CVM 'Parecer 40' number. NB on two of these: Art. 88 of Res 520 is the
#     AUTHORISATION adjustment/transition provision (270-day window; cybersecurity +
#     Law 13.810/2019 controls), NOT the Travel-Rule hook — the Travel Rule sits in
#     Art. 44 (rule) + Art. 89 (two-stage phase-in: domestic by Feb 2027, international
#     by Feb 2028); and Art. 76-A is a provision of Resolução BCB 277/2022 (inserted by
#     Res 521), not of Lei 14.286/2021.
#   This pass did NOT read the official normativo article text for the Tier 2 pinpoints;
#   clause-level confirmation remains the author's step.
# =============================================================================

corridor_id: hk-br-usd-stablecoin-settlement-001
name: "HK → Brazil — USD-referenced stablecoin B2B settlement"
schema: corridor/v2-rich
origin: HK
destination: BR
direction: directed
legs: [HK, BR]
feasibility_class: "Category I/II (dual authorization or partnership) — counterparty-conditional + size-capped"
compatibility_category: "I/II"
compatibility_pair: "BR-HK"
interaction_sets: [A, D]   # matches Architecture §5.14 BR-HK (undirected); no divergence

flow: >
  A USD-referenced stablecoin used as the settlement medium for a B2B cross-border
  flow, originating on the Hong Kong side and terminating on the Brazil side.
  Ticket size is the hinge: both Brazil crypto rails are capped per operation, so
  corridor feasibility differs sharply between sub-cap and above-cap tickets.

# --------------------------------------------------------------------------- #
boundary_analysis:

  - leg: HK
    role: origination
    confidence: medium_high
    sub_gates:

      - id: hk_issuer
        label: "Issuer side — Stablecoins Ordinance (Cap. 656)"
        requirement: >               # VERIFIED
          A licence is required only if the stablecoin is (i) issued in Hong Kong, or
          (ii) referencing the HKD (in or outside HK), or (iii) actively marketed to the
          HK public. A USD-referenced coin is NOT HKD-referencing, so limb (ii) does not
          apply. Limb (i) "issued in HK" is currency-agnostic and turns on the HKMA factor
          test: place of incorporation; day-to-day management; minting/burning location;
          where reserve assets are managed; where the mint/redeem bank account is held.
        analysis: >                  # INTERPRETIVE — CORRECTED
          The regime permits a USD-referenced FRS licence in principle (limb (i) is
          currency-agnostic), BUT no USD FRS has been licensed: the first cohort
          (10 Apr 2026) licensed only HKD-referenced issuers — Anchorpoint (FRS01,
          HKDAP = "HKD At Par") and HSBC (FRS02) — and HKMA commentary signals no
          near-term USD-pegged path. So for this corridor the live HK route for a USD
          coin is NOT a domestic FRS licence; it is an offshore-issued non-HKD FRS
          (e.g. a US issuer) that is not "issued in HK" on the factor test and not
          actively marketed to HK retail. (Note: HKDAP tracks USD only indirectly —
          the HKD is pegged to USD at 7.75–7.85 under the Linked Exchange Rate System —
          but it is legally an HKD instrument and is a different instrument from a USD coin.)
        record_refs: [hk-frs-issuer_pathway-001, hk-frs-monetary_sovereignty-001]

      - id: hk_distribution
        label: "Distribution side — permitted offerors"
        requirement: >               # VERIFIED
          Offering an FRS does not itself need a stablecoin licence, but only "permitted
          offerors" may offer an FRS in HK — even one issued offshore / non-HKD: the
          licensed FRS issuer, authorised institutions (banks), SFC-licensed VATPs,
          SFC Type 1 corporations, and SVF licensees. An FRS from an issuer not HK-licensed
          (e.g. a foreign non-HKD FRS) may be offered to professional investors only.
        analysis: >                  # INTERPRETIVE
          With no domestic USD FRS available, channel is the operative HK constraint:
          distribution of the USD coin must run through a permitted offeror, and (because
          the issuer is not HK-licensed) to professional investors only. The PI-only limb
          is not binding for B2B — institutional counterparties typically qualify as PIs.
        record_refs: [hk-frs-distribution-001, hk-frs-monetary_sovereignty-001]

      - id: hk_settlement_tokenised
        label: "Settlement into tokenised funds — SFC securities perimeter"
        requirement: >               # VERIFIED (statute/circular); application interpretive
          Where the flow routes a stablecoin balance into a tokenised money-market fund,
          that fund is a "tokenised security" under the SFO (an interest in a CIS).
          The SFC's Tokenised Securities Circular (2 Nov 2023, 23EC52/23EC53) applies
          "same business, same risks, same rules" on a see-through basis; dealing/
          distribution needs the relevant SFC licence (Type 1, etc.). Absent SFC
          authorisation under Part IV SFO / prospectus compliance, the offer is PI-only.
        analysis: >                  # INTERPRETIVE — the C4 link
          HK analogue of the US Reves/§404 securities-classification spine: in HK a
          tokenised MMF is squarely a tokenised security, with SFC-authorised retail
          instances already live (retail tokenised MMFs authorised Q1 2025). HK gives a
          clean "yes, it is a security, and here is the regulated path".
        record_refs: []             # GAP: write hk-frs-securities_classification-001 (planned v0.3.x)
        gap_note: "No HK securities_classification record exists yet — this sub-gate is the spec for it."

    clears: >
      A B2B USD-stablecoin settlement clears the HK side where: the coin is an offshore
      non-HKD FRS not actively marketed to HK retail (a domestically-licensed USD FRS
      does not yet exist — first cohort is HKD-only); it is offered only via a permitted
      offeror to professional investors (B2B counterparties qualify); and any tokenised-
      fund leg uses an SFC-authorised tokenised product or is confined to PIs under the
      tokenised-securities-circular controls.

    breaks: >
      Issuing a USD-referenced stablecoin in HK (per the factor test) without an HKMA FRS
      licence; actively marketing the coin to the HK retail public; offering through a
      non-permitted offeror; or routing into a tokenised MMF/security and distributing it
      to HK retail without SFC authorisation / prospectus compliance (PI-only otherwise).

    sources:
      - "Stablecoins Ordinance (Cap. 656), s.14(1) licensing; Schedule 2 minimum criteria"
      - "HKMA Explanatory Note on Licensing of Stablecoin Issuers (29 Jul 2025) — 'issued in HK' factor test; permitted offerors; non-HKD FRS PI-only"
      - "SFC Circulars on tokenised securities-related activities & tokenised SFC-authorised products (2 Nov 2023, 23EC52 / 23EC53)"
      - "SFC circular permitting secondary trading of tokenised SFC-authorised products (20 Apr 2026) — CONFIRM date against SFC source"
      - "Live cohort: HKMA first FRS licences 10 Apr 2026 — Anchorpoint (FRS01, HKDAP/HKD-referenced) + HSBC (FRS02, HKD-referenced); NO USD FRS licensed"
      - "Live instances: SFC-authorised retail tokenised MMFs (Q1 2025)"
    review_by: "2026-09-30"          # SFC tokenisation perimeter evolving; HKMA second cohort posture on non-HKD pegs

  - leg: BR
    role: termination
    confidence: high                 # legal architecture verified to article level
    sub_gates:

      - id: br_efx_rail
        label: "eFX rail — closing to crypto on the external leg"
        requirement: >               # VERIFIED
          Res 561 (pub. 30 Apr 2026; in force 1 Oct 2026; amends Res 277/2022, which
          regulates the FX Law, Lei 14.286/2021) bars eFX providers from settling the
          external leg — provider ↔ foreign counterparty (contraparte no exterior) —
          with virtual assets; settlement must be via an FX operation or a non-resident
          BRL (reais) account. eFX is the mass/low-value retail rail: per-operation
          ceilings of USD 10k (unilateral transfers; same-owner transfers; and, new under
          561, financial/capital-market investment transfers); it is not a high-value B2B rail.
        analysis: >                  # INTERPRETIVE
          The ban is specific to the eFX settlement leg, not a general stablecoin ban —
          crypto trading, custody, and other arrangements remain permitted under the VASP
          regime. The USD 10k eFX ceiling independently confirms eFX was never the natural
          B2B rail; the practical effect is to foreclose the "reais → USDT → settle abroad
          on-chain" eFX back-end (the Nomad/Braza-Bank-style rail).
        record_refs: []             # target: br-vasp-cross_border_data-001 (forthcoming)

      - id: br_vasp_fx_rail
        label: "VASP-in-FX rail — open but capped"
        requirement: >               # VERIFIED to article level
          Res 521 (pub. 10 Nov 2025; in force 2 Feb 2026; amends the FX-law trio
          Res 277/278/279 that regulate Lei 14.286/2021 — inserting Art. 76-A into
          Res 277 as the "ativos virtuais no mercado de câmbio" hook) brings authorised
          VASPs' (SPSAVs') virtual-asset international payments/transfers into the FX
          market as legitimate câmbio operations, subject to a per-operation cap that bites
          WHEN THE FOREIGN COUNTERPARTY IS NOT a BCB-FX-authorised institution: USD 100k
          for a SPSAV; USD 500k for an FX-authorised institution (bank / DTVM / CTVM /
          corretora de câmbio). Audit + monthly FX reporting to the BCB from 4 May 2026.
        analysis: >                  # INTERPRETIVE
          For a USD-stablecoin B2B settlement the foreign counterparty is typically not
          BCB-FX-authorised, so the cap bites. The cap — not the rail choice — is usually
          the binding constraint for B2B ticket sizes; above it the flow reverts to
          traditional câmbio (bank FX desk / DTVM).
        record_refs: []             # target: br-vasp-issuer_pathway-001, br-vasp-cross_border_data-001

      - id: br_custody_assets
        label: "Custody, segregation & asset curation — Res 520"
        requirement: >               # VERIFIED to article level
          Res 520 (in force 2 Feb 2026) requires a documented patrimonial-segregation
          policy (Art. 28–30): client fiat in individualised accounts; client virtual
          assets in wallets distinct from the provider's own-operation wallets; the methods
          used for proof of reserves; and an independent audit of the provider's and
          clients' virtual assets on a BIENNIAL basis at reasonable-assurance level
          (Art. 30 III), with the report publicly disclosed on the provider's website
          (Art. 30 §1). Up to 5% own-asset co-mingling is allowed for immediate liquidity
          if identified/recorded. Asset curation (Art. 64+) PROHIBITS offering/intermediating
          algorithmic stablecoins or any fiat-pegged token without effective, verifiable
          liquid-asset backing; the "ativo de reserva" is defined as fiat + government bonds
          issued by the same government. Foreign custodians may be used only under home-
          country authorisation/supervision, with a Brazil representative, enforceable
          guarantees, formal segregation of Brazilian clients' assets, and record access.
        analysis: >                  # INTERPRETIVE
          A USD stablecoin used in this corridor must be an auditable-reserve coin; an
          algorithmic or opaque-reserve coin is excluded at the Brazilian custody/listing
          gate regardless of the rail. The foreign-custodian conditions are directly
          relevant to the HK/offshore custody leg of this corridor.
        record_refs: []             # target: br-vasp-custody-001, br-vasp-reserve_backing-001, br-vasp-disclosure_reporting-001

    clears: >
      Authorised-VASP-in-FX channel (Res 521), within the per-operation cap (USD 100k
      SPSAV / USD 500k FX-authorised institution where the foreign counterparty is not
      BCB-FX-authorised), with audit + monthly FX reporting from 4 May 2026 and Res 520
      custody/segregation (Art. 28–30: proof-of-reserves, biennial reasonable-assurance
      audit, public report), using an auditable-reserve (non-algorithmic) stablecoin.

    breaks: >
      eFX back-end stablecoin settlement rail (Res 561) — closing 1 Oct 2026. Tickets above
      the SPSAV / FI per-operation caps (no crypto rail available — reverts to traditional
      câmbio). Algorithmic or non-auditable-reserve stablecoins (excluded by Res 520
      asset-curation rules, Art. 64+).

    sources:
      - "BCB Resolutions 519/2025, 520/2025, 521/2025 (pub. 10 Nov 2025; in force 2 Feb 2026; audit/reporting from 4 May 2026)"
      - "BCB Resolution 561/2026 (pub. 30 Apr 2026; in force 1 Oct 2026; amends Res 277/2022)"
      - "Res 520 Art. 28–30 (segregation; proof-of-reserves methods; biennial reasonable-assurance audit; public website disclosure); Art. 64+ (asset curation / algorithmic-stablecoin prohibition)"
      - "Lei 14.286/2021 (Foreign Exchange Law) — the FX statute regulated by Res 277/278/279 and amended by Res 521/561 (legal authority: arts. 2-6, 10, 14, 15, 18, per the Res 521 recital)"
      - "Res 277/2022 Art. 76-A (inserted by Res 521; new Título VIII-A) — the 'prestação de serviços de ativos virtuais incluída no mercado de câmbio' hook"
      - "Lei 14.478/2022 (Marco Legal dos Ativos Virtuais); Decreto 11.563/2023 (designates BCB; preserves CVM jurisdiction over securities-like tokens)"
      - "Instrução Normativa BCB 701 (22 Jan 2026) — independent technical certification for intermediation/custody"
    review_by: "2026-10-30"

# --------------------------------------------------------------------------- #
key_constraint: >
  The binding constraint is regulatory geography COMPOUNDED BY A SIZING CEILING, and the
  two legs gate on different axes. Brazil offers no single uniform crypto rail: the eFX
  mass-payment rail's external settlement leg is closing to crypto (Res 561, 1 Oct 2026)
  and is in any case capped at USD 10k/op, so a stablecoin B2B flow must use the authorised-
  VASP-in-FX channel (Res 521) — itself capped per operation (USD 100k SPSAV / USD 500k
  FX-authorised institution, where the foreign counterparty is not BCB-FX-authorised) and
  limited to auditable-reserve, non-algorithmic stablecoins (Res 520). Above those caps,
  neither crypto rail is available and the flow reverts to traditional câmbio. Hong Kong
  gates the SAME instrument on a different axis — not a numeric cap but a perimeter/
  eligibility line: issued-in-HK FRS licensing, permitted-offeror distribution,
  professional-investor-only for non-HKD FRS (and, today, the absence of any licensed USD
  FRS — first cohort is HKD-only), and (if the flow touches a tokenised fund) the SFC
  securities perimeter. A single USD-stablecoin instrument therefore cannot serve both legs
  as one uniform rail: HK gates on WHO may issue/offer and TO WHOM; Brazil gates on WHICH
  rail and UP TO WHAT SIZE. Four-way composition (rail × cap × auditable-reserve × HK
  eligibility), not a single prohibition.

us_doctrinal_link: >
  Both legs turn on the same question as US §404's bona-fide-activity carve-out: what
  activity is permitted on the regulated stablecoin rail. Brazil answers by rail-and-cap
  (eFX closed; VASP-in-FX open but capped), with a parallel securities axis: the BCB/CVM
  jurisdictional split (Decreto 11.563/2023 preserves CVM authority over securities-like
  tokens) is the Brazilian analogue of the US Reves/§404 securities-classification spine —
  though Brazil's C4 contribution is currently token-classification + asset-curation
  (Res 520), not yet a developed routing-into-tokenised-fund story (the CVM-175 fund
  analogue would be the true parallel to the US 1940-Act MMF routing question). HK answers
  by perimeter-and-eligibility and treats a tokenised MMF as a tokenised security. US
  remains the anchor instance; HK and Brazil are two contrasting resolutions of the
  identical boundary.

# --------------------------------------------------------------------------- #
watch_list:
  - { event: "BCB Res 561 in force",                                            date: "2026-10-01", affects: [br_efx_rail] }
  - { event: "BR VASP non-authorised-provider prohibition (Res 519/520) + 270-day grandfathering ends", date: "2026-10-30", affects: [br_vasp_fx_rail, br_custody_assets] }
  - { event: "eFX-modality Unicad registration deadline for already-authorised institutions (Res 561 Art 56-A)", date: "2026-10-30", affects: [br_efx_rail] }
  - { event: "Unauthorised eFX providers must apply for payment-institution authorisation (Res 561 Art 56-B)", date: "2027-05-31", affects: [br_efx_rail] }
  - { event: "IOF on stablecoin/FX ops — fato gerador created by Res 521; NO Receita Federal norm in force as of Jun 2026 (proposed IOF-Câmbio 3.5% vs 'private FX' 1.1% — in public consultation, no date)", date: "unresolved", affects: [br_vasp_fx_rail] }
  - { event: "BR Travel Rule phase-in stage 1 — domestic PSAV-to-PSAV transfers (Res 520 Art. 89)", date: "2027-02", affects: [br_vasp_fx_rail] }
  - { event: "BR Travel Rule full compliance — international transfers + carteiras autocustodiadas (Res 520 Art. 89)", date: "2028-02-02", affects: [br_vasp_fx_rail] }
  - { event: "SFC tokenisation perimeter — secondary-trading circular bedding in", date: "2026-Q3", affects: [hk_settlement_tokenised] }
  - { event: "HKMA second-cohort posture on non-HKD / USD-referenced pegs",     date: "pending", affects: [hk_issuer] }

confidence: medium                   # legal facts high; cross-leg composition is the author's synthesis
last_reviewed: "2026-06-23"
valid_as_of: "2026-06-23"
phase_in_note: >
  Brazil is in rolling implementation: Res 561 in force 1 Oct 2026; non-authorised-provider
  prohibition and eFX-modality Unicad registration 30 Oct 2026; unauthorised eFX providers
  must seek payment-institution authorisation by 31 May 2027; Travel Rule fully phased by
  2 Feb 2028; IOF treatment unresolved. A reader after mid-2026 should re-verify these
  moving parts before relying on the corridor.
version_added: 0.1.0
version_corrected: 0.3.1
reviewed_against: >
  Firm/practitioner analysis of BCB Res 519/520/521 + 561 (Notabene, Cescon, BDO, Global
  Legal Insights, Conduit) and the official BCB normativo URLs (confirmed to exist); the
  article-level pinpoints (e.g. Res 520 Art 29/30, Res 561 ementa amending Res 277/2022)
  are taken from those firm summaries and NOT yet read against the official DOU/BCB text.
  Statutory base: Lei 14.286/2021 (FX) + Lei 14.478/2022 + Decreto 11.563/2023; the
  câmbio-inclusion hook Art. 76-A is a provision inserted into Res 277/2022 by Res 521
