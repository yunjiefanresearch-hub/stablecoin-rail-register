interpretation_note: 'Provenance: corridor fieldwork. The three-modality structure and the Art. 4 pinpoint are drawn
  from concordant firm analysis (Notabene, Cescon); confirmation against the official BCB normativo text is the
  remaining step (evidence_tier: firm_summary). For the corridor, the foreign counterparty''s BCB-FX-authorisation
  status (not the SPSAV modality) drives the Res 521 cap. Note: firms cite 260 (Cescon) vs 270 (Notabene) grandfathering
  days; the operative deadline is 30 Oct 2026.


