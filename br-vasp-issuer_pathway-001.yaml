id: br-vasp-issuer_pathway-001
jurisdiction: BR
authority: BCB
instrument_type: other
instrument_label_local: sociedade prestadora de serviços de ativos virtuais (SPSAV)
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: 'Providing virtual-asset services in Brazil requires prior BCB authorisation as an SPSAV. Under
  Res BCB 520 Art. 4 there are three modalities — Intermediário, Custodiante and Corretor (intermediary / custodian
  / broker, the broker combining both functions); a provider may not accumulate incompatible functions. Already-regulated
  institutions may also offer virtual-asset services on notification to the BCB: commercial / investment / multiple
  banks, Caixa Econômica Federal, and securities brokers (CTVM), distributors (DTVM) and FX dealers (corretoras
  de câmbio). Overseas providers must be authorised before operating, requiring a local subsidiary or partnership
  with a licensed local entity. Grandfathering: providers operating before 2 Feb 2026 may continue while authorisation
  is processed (apply within ~260–270 days), but transactions with non-authorised providers are prohibited from
  30 Oct 2026, after which a non-compliant provider must cease within 30 days.'
requirement_structured:
  modalities:
  - Intermediário
  - Custodiante
  - Corretor
  function_accumulation: prohibited (must operate per designation)
  local_presence_required: true
  grandfathering_deadline: '2026-10-30'
status: in_force
effective_date: '2026-02-02'
source:
