id: jp-epi-reserve_backing-001
jurisdiction: JP
authority: FSA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: Electronic Payment Instrument (EPI)
dimension: reserve_backing
constraint_ref: C2
requirement_summary: Full backing is the baseline; funds-transfer and bank types hold liquid backing. For the trust-type,
  Act No. 66 of 2025 permits up to fifty percent of issuance value to be held in low-risk short-term assets (Japanese
  or US government bonds with no more than three months remaining maturity, or terminable time deposits). The bond-eligibility
  detail was the subject of an FSA consultation that ran until 27 February 2026; final standards were pending at
  that date.
requirement_structured:
  baseline: full backing
  trust_type_relaxation: up to 50% in low-risk short-term assets (JGB/US govt bonds <=3 months, or terminable time
    deposits) under Act No. 66 of 2025
  fsa_consultation: bond-eligibility detail; ran to 27 Feb 2026; final standards pending
