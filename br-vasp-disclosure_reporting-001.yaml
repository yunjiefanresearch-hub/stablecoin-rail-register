interpretation_note: 'Provenance: corridor fieldwork, refined against a primary-source pass (Jun 2026). This is
  the register''s FIRST populated disclosure_reporting (C8) cell — C8 was empty across all six focus jurisdictions.
  Monthly-reporting basis (Art. 82-A) + 4 May 2026 commencement verified. CORRECTION: ''Anexo II-A'' is the OFFICIAL
  schedule label — Res 521''s Art. 82-A requires sending ''as informações constantes do Anexo II-A'' and appends
  ''ANEXO II-A À RESOLUÇÃO BCB Nº 277/2022'' (confirmed against the Res 521 DOU text); an earlier pass had deleted
  it. ''DeCripto'' does not appear in the resolution and is dropped here (it is a future Receita crypto-reporting
  label; current Receita crypto reporting is IN 1888). Remaining check: the Res 520 audit article number and ''reasonable
  assurance'' wording.


