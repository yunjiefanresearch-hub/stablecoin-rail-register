id: br-vasp-disclosure_reporting-001
jurisdiction: BR
authority: BCB
instrument_type: other
instrument_label_local: ativo virtual (auditoria e reporte)
dimension: disclosure_reporting
constraint_ref: C8
requirement_summary: 'Res BCB 520 requires SPSAVs to document proof-of-reserves methods and to publish reports and
  reserve attestations, with an independent audit on a biennial basis (sources: ''biennial / biannual independent
  audit cycle''). Res BCB 521 Art. 82-A adds mandatory monthly reporting to the BCB of all FX transactions and international
  transfers involving virtual assets (including self-hosted-wallet data and counterparty identification), following
  the model used for traditional international transactions; the information is reported per ''Anexo II-A'' and
  the obligation commences 4 May 2026. Instrução Normativa BCB 701 (22 Jan 2026) sets the form of the independent
  technical certification for intermediation/custody.'
requirement_structured:
  proof_of_reserves: methods documented; attestations published
  independent_audit_frequency: biennial
  audit_assurance_level: reasonable assurance — confirm
  bcb_reporting: monthly (FX/virtual-asset operations) from 2026-05-04
  reporting_basis: Res 521 Art. 82-A; information per 'Anexo II-A' (to Res 277/2022)
