instrument_label_local: single-currency stablecoin (SCS)
dimension: permitted_activity_yield
constraint_ref: C3
requirement_summary: Yield is not directly prohibited, but the MAS-regulated SCS label is restricted to SGD or G10-pegged
  tokens issued from Singapore-incorporated entities, and SCS issuers are forbidden from engaging in lending or
  staking. The activity prohibition (no lend/stake) is the operative yield-adjacent constraint rather than a flat
  interest ban.
requirement_structured:
  direct_yield_ban: not explicit
