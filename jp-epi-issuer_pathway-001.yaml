id: jp-epi-issuer_pathway-001
jurisdiction: JP
authority: FSA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: Electronic Payment Instrument (EPI)
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: 'A closed trichotomy: only (a) banks (deposit-type), (b) registered funds-transfer service
  providers, and (c) trust companies or trust banks (trust-type) may issue Electronic Payment Instruments. Distribution
  and intermediation require registration as an Electronic Payment Instruments Exchange Service Provider (EPIESP).
  The issuer trichotomy is the binding eligibility constraint and the structural hallmark of the regime.'
requirement_structured:
  trichotomy:
  - banks (deposit-type)
  - registered funds-transfer providers
  - trust companies / trust banks (trust-type)
  intermediation: registered Electronic Payment Instruments Exchange Service Provider (EPIESP)
  note: the binding eligibility constraint and structural hallmark
status: in_force
effective_date: '2023-06-01'
source:
