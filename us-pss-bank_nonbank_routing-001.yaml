id: us-pss-bank_nonbank_routing-001
jurisdiction: US
authority: OCC/FDIC (bank issuers); SEC/CFTC (intermediaries under CLARITY §404)
instrument_type: payment_stablecoin
instrument_label_local: payment stablecoin / covered party
dimension: bank_nonbank_routing
constraint_ref: C5
requirement_summary: 'The regime separates roles along a routing chain. A bank operating as a Layer 1 issuer under
  the GENIUS Act operates under bank supervision; non-bank permitted issuers operate under the OCC/FDIC payment-stablecoin
  charter. CLARITY §404 adds an intermediary layer: ''covered parties'' (digital-asset service providers and affiliates)
  may not pay yield on held balances, but may facilitate user-initiated activity. The author synthesises a generalisable
  three-layer routing architecture: (1) a compliant issuer layer (GENIUS-compliant payment stablecoin), (2) an authorised
  routing layer (the wallet/intermediary that executes the user''s signed instruction), and (3) a yield-bearing
  tokenised cash-management layer (registered tokenised MMF). The binding question is which entity in the chain
  holds which authorisation, and whether the routing layer''s action is a permitted facilitation or a prohibited
  yield/brokerage activity.'
requirement_structured:
  layers:
  - L1 compliant issuer (bank or non-bank PPSI)
  - L2 authorised routing layer (wallet/intermediary)
  - L3 yield-bearing tokenised cash management (registered MMF)
  binding_question: authorisation held at each layer; facilitation vs. prohibited activity at L2
