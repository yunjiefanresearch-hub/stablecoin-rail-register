corridor_id: us-eu-usd-eur-settlement
name: United States -> European Union (USD->EUR settlement)
schema: corridor/v3-directed-edge
origin: US
destination: EU
direction: directed
currencies: USD -> EUR
feasibility_class: Category I (dual authorization available) — scale-capped
compatibility_category: I/II
compatibility_pair: EU-US
divergence:
  kind: interaction_sets
  against_pair: EU-US
  pair_interaction_sets:
  - B
  - D
  edge_interaction_sets: &id001
  - A
  - C
  - D
  reason: Directed-edge operative interaction sets (Corridor Atlas v0.2.3 §5, read at the destination
    inbound gate for THIS direction) differ from the undirected pairwise sets (Architecture §5.14). The
    Atlas generalizes the §5.12/§5.14 undirected pairs into directed edges and re-derives the operative
    interaction sets per direction; the compatibility CATEGORY agrees, the interaction-set list may differ
    by direction. This divergence is declared, not silent.
archetypes:
- RC
- SC
- TC
- DC
interaction_sets: *id001
infrastructure_overlap: Project Agora (shared Western wholesale-settlement experimental path)
inbound_mechanism:
  test: MiCA EMT authorization wall + Article 58(3) means-of-exchange cap
  detail: A non-EUR token faces enhanced reporting and, once significant and used as a means of exchange,
    the Article 58(3) ceiling (one million transactions/day or EUR 200m/day). A EUR sister EMT via a MiCA-authorized
    issuer avoids the cap.
  administrator: EBA / national competent authorities
note: Demand is high and the corridor is operable, but the binding question is scale, not permission.
  A dollar token can be distributed via a MiCA-authorized issuer, yet once significant and used as a means
  of exchange it meets the Article 58(3) ceiling; the uncapped route is a euro sister token (Circle's
  euro authorization is the working example). An unauthorized dollar token cannot be lawfully distributed
  at all (the Tether delisting lesson).
source:
  primary: Fan, Cross-Border Digital-Finance Corridor Atlas v0.2.3 (June 2026), §5.1 (United States ->
    European Union)
  secondary: 'Fan, Cross-Border Stablecoin Architecture v3 (Twelve Jurisdictions, June 2026), §5.14 (EU
    x US: Category I/II hybrid — undirected §5.14 pair; see this edge''s `divergence` field)'
valid_as_of: 2026-06
evidence_tier: firm_summary
version_added: 0.5.0
