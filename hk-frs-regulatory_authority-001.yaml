requirement_summary: The Stablecoins Ordinance (Cap. 656), effective 1 August 2025, establishes the HKMA as primary
  regulator for FRS issuers, supported by HKMA Explanatory Notes (Licensing; Transitional Provisions), the Guideline
  on Supervision of Licensed Stablecoin Issuers, and the AML/CFT Guideline. The SFC regulates virtual asset trading
  platforms (VATPs) and Type 1 corporations authorised to offer stablecoins.
