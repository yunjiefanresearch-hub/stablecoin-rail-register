requirement_summary: 'In-force regime. Milestones: CBUAE Payment Token Services Regulation (Circular 2/2024) issued
  (2024); one-year transition period for existing arrangements (2024-2025); transition period closes and AED tokens
  (AE Coin, Zand AED) go live, with the DFSA recognising USD tokens (USDC, RLUSD) (2025-2026). Multiple AED tokens
  and DFSA-recognised USD tokens are now live.'
