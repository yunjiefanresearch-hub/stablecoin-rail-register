requirement_summary: 'Guidance-in-force regime. Milestones: FINMA Guidance 06/2024 published (Jul 2024); bank-guarantee
  and licensed-institution pathways in operation (2024-2025); consultation on a Financial Institutions Act (FinIA)
  amendment creating a dedicated payment-instrument-institution licence to replace the guarantee workaround closed
  (6 Feb 2026); six-bank CHF stablecoin sandbox launched (8 Apr 2026). If enacted, the FinIA amendment would replace
  the guarantee workaround with a purpose-built regime.'
