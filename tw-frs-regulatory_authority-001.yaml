id: tw-frs-regulatory_authority-001
jurisdiction: TW
authority: FSC (primary; consults the CBC)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: virtual asset / draft stablecoin (Virtual Asset Service Act)
dimension: regulatory_authority
requirement_summary: 'Two layers, only one in force. In force: AML registration under the amended Money Laundering
  Control Act and the VASP Registration Regulations (effective 30 November 2024). Draft (not in force): the Virtual
  Asset Service Act, a comprehensive bill that would create FSC licensing for virtual-asset services including stablecoin
  issuance, with mandatory central-bank consultation; committee first review completed 3 June 2026. The FSC is the
  primary regulator and consults the Central Bank of the Republic of China (Taiwan) (CBC) on stablecoin matters.'
requirement_structured:
  in_force_layer: AML registration (amended Money Laundering Control Act + VASP Registration Regulations, 30 Nov
    2024)
  draft_layer: Virtual Asset Service Act (FSC licensing; committee first review 3 Jun 2026; not in force)
  primary_regulator: FSC
  central_bank_role: CBC consulted (onshore-NTD posture is the live question)
status: in_force
effective_date: '2024-11-30'
source:
  primary: Money Laundering Control Act (as amended) + VASP Registration Regulations (in force 30 Nov 2024); draft
    Virtual Asset Service Act
  pinpoint: Regulators — FSC primary (consults CBC); AML registration in force; comprehensive act in committee
  url: https://law.moj.gov.tw/
