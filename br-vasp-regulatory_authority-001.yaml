id: br-vasp-regulatory_authority-001
jurisdiction: BR
authority: BCB (Banco Central do Brasil); CVM retains jurisdiction over securities-like tokens
instrument_type: other
instrument_label_local: sociedade prestadora de serviços de ativos virtuais (SPSAV)
dimension: regulatory_authority
requirement_summary: Lei 14.478/2022 (Marco Legal dos Ativos Virtuais) and Decreto 11.563/2023 designate the Banco
  Central do Brasil (BCB) as the authority for virtual-asset service providers (SPSAVs), while preserving the Comissão
  de Valores Mobiliários (CVM) jurisdiction over virtual assets that are securities (token taxonomy follows CVM
  Parecer de Orientação 40). The operative VASP framework is Res BCB 519/520/521 (pub. 10 Nov 2025; in force 2 Feb
  2026), supplemented by Res BCB 561/2026 for the eFX rail. The foreign-exchange classification of cross-border
  virtual-asset payments rests on the Foreign Exchange Law, Lei 14.286/2021.
