id: ch-frs-securities_classification-001
jurisdiction: CH
authority: FINMA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: stablecoin (Banking Act; bank-guarantee or licensed-institution pathway)
dimension: securities_classification
constraint_ref: C4
requirement_summary: If a stablecoin arrangement is structured so that assets are held for the account of holders
  (rather than as a contractual claim against the issuer), collective-investment-scheme rules under the Collective
  Investment Schemes Act (CISA) may apply. The operative characterization question is whether holding assets for
  holders to generate yield converts the arrangement into a CIS — the Swiss analogue to the securities-classification
  spine.
requirement_structured:
  test: are assets held for the account of holders, or as a claim against the issuer?
  if_for_holders: potential CIS under CISA
  spine_analogue: CISA characterization is the C4 boundary in Switzerland
status: in_force
source:
