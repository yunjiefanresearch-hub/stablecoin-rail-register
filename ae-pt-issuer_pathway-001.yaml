id: ae-pt-issuer_pathway-001
jurisdiction: AE
authority: CBUAE / VARA / FSRA / DFSA
instrument_type: payment_stablecoin
instrument_label_local: Payment Token (Dirham Payment Token / Foreign Payment Token)
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: Onshore, a Dirham Payment Token (DPT) may be issued only by a CBUAE-licensed, UAE-incorporated
  entity; a Foreign Payment Token (FPT) is a registered foreign issuer's token that may be used only to purchase
  virtual assets or derivatives, not for general payments. Banks may issue payment tokens through a subsidiary.
  Free-zone issuers operate under the VARA/FSRA/DFSA frameworks but cannot issue AED tokens — AED issuance is reserved
  to the CBUAE regime.
requirement_structured:
  dpt_onshore: CBUAE-licensed, UAE-incorporated entity
  fpt_onshore: registered foreign issuer; usable only for VA/derivative purchases
  banks: may issue via a subsidiary
  free_zone: VARA/FSRA/DFSA frameworks; cannot issue AED tokens
status: in_force
source:
  primary: CBUAE PTSR (Circular 2/2024); VARA / ADGM-FSRA / DIFC-DFSA frameworks
  pinpoint: Issuer pathways — DPT (CBUAE-licensed); FPT (foreign, VA/derivative-only); bank subsidiary; free-zone
    cannot issue AED
  url: https://rulebook.centralbank.ae/en/rulebook/payment-token-services-regulation
