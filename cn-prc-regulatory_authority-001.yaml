id: cn-prc-regulatory_authority-001
jurisdiction: CN
authority: PBOC; CAC; CSRC; MIIT; SAFE
instrument_type: other
instrument_label_local: 虚拟货币 / stablecoin (no lawful domestic instrument)
dimension: regulatory_authority
constraint_ref: C1
requirement_summary: 'No single stablecoin regulator exists because there is no lawful domestic issuance pathway;
  instead, a coordinated multi-agency prohibition perimeter governs. The eight-ministry Notice 银发〔2026〕42号 (in force
  6 Feb 2026), issued jointly with the Cyberspace Administration and the two supreme judicial organs, sets the perimeter:
  the People''s Bank of China (PBOC) leads, with the NDRC, MIIT, MPS, SAMR, NFRA, CSRC, and SAFE. The 2026 Notice
  put the prohibition on private RMB-pegged stablecoin issuance into writing, formalising the stance PBOC had signalled
  to PRC tech groups in 2025. The CAC governs ICP, deep-synthesis/generative-AI content, and cross-border data flows;
  the CSRC governs A-share issuer disclosure and has directed brokerages to pause Hong Kong tokenisation activity;
  MIIT and SAFE supply supporting telecoms/ICP and outbound-capital measures.'
requirement_structured:
  agencies:
    PBOC: primary financial regulator; private RMB-linked issuance guidance (Oct 2025)
    CAC: cross-border data, ICP, content; joined Oct 2025 guidance
    CSRC: A-share disclosure; brokerage tokenization pause
    MIIT: telecoms / ICP supporting measures
    SAFE: outbound capital and profit repatriation control
  single_stablecoin_regulator: false
status: in_force
effective_date: null
source:
