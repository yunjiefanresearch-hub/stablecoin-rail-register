id: cn-prc-monetary_sovereignty-001
jurisdiction: CN
authority: PBOC; CAC
instrument_type: other
instrument_label_local: 非人民币代币 (non-RMB currency tokens)
dimension: monetary_sovereignty
constraint_ref: C7
requirement_summary: Mainland China occupies the prohibitive pole of the monetary-sovereignty constraint. The eight-ministry
  Notice 银发〔2026〕42号 (in force 6 Feb 2026) reaffirms that virtual currencies have no legal-tender status and adds
  an explicit WRITTEN prohibition on overseas issuance of RMB-pegged stablecoins without lawful approval (未经许可，境内外任何主体不得在境外发行挂钩人民币的稳定币),
  plus an extraterritorial ban on PRC-controlled entities issuing virtual currencies abroad and restrictions on
  RWA tokenisation.
requirement_structured:
  cap_type: total prohibition (non-RMB tokens), not quantitative
  policed_boundary: private vs state authority to issue currency-like instruments
  sovereign_instrument: e-CNY
  spectrum_position: prohibitive pole (vs EU quantitative cap, HK qualitative restriction)
status: in_force
effective_date: null
source:
  primary: 《关于进一步防范和处置虚拟货币等相关风险的通知》(银发〔2026〕42号, eff. 6 Feb 2026; repealed 银发〔2021〕237号); 2017 ICO Notice (94公告)
  pinpoint: 银发〔2026〕42号 — 未经许可，境内外任何主体不得在境外发行挂钩人民币的稳定币 (no entity, domestic or overseas, may issue RMB-pegged stablecoins
    overseas without approval); 境内主体及其控制的境外主体不得在境外发行虚拟货币 (PRC-controlled entities may not issue virtual currencies
    abroad); RWA tokenisation restrictions
  url: https://www.csrc.gov.cn/csrc/c100028/c7614318/content.shtml
secondary:
- citation: Fan, Multi-Jurisdiction Stablecoin Compliance Matrix v0.9.6 (June 2026), §Mainland China (Comparison
    Table — Non-domestic currency caps) [re-pinned from v0.9.3]
interpretation_note: 'Provenance: transcribed from the author''s Compliance Matrix (re-pinned to v0.9.6; originally
  v0.9.3). This is the PRC instance of Constraint 7. The three-jurisdiction sovereignty spectrum (EU quantitative
  cap / HK qualitative restriction / PRC total prohibition) is the comparative payload of the author''s monetary-sovereignty
  paper.


  [v0.9.5 verification] NATIVE-LANGUAGE VERIFICATION (Chinese) — MATERIAL CURRENCY FIX: the previously cited basis
  (''PBOC October 2025 verbal guidance'') is replaced. The RMB-pegged-stablecoin prohibition is now WRITTEN, in-force
  law: 银发〔2026〕42号 (6 Feb 2026), confirmed against the csrc.gov.cn official text, which also explicitly repealed
  the 2021 Notice (银发〔2021〕237号同时废止). Substance unchanged: CN remains the prohibition pole; this is a provenance
  + currency correction, not a re-classification.'
