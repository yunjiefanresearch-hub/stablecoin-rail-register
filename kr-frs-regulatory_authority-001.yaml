id: kr-frs-regulatory_authority-001
jurisdiction: KR
authority: FSC (would administer); BOK (consultative)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: won-referenced stablecoin (draft Digital Asset Basic Act)
dimension: regulatory_authority
requirement_summary: 'Two layers, only one in force. In force: the Virtual Asset User Protection Act (VAUPA), a
  user-protection and market-abuse regime, not an issuance-licensing framework. Pending: the Digital Asset Basic
  Act, which would create an issuance regime but remained an un-enacted bill as of late June 2026. Under the leading
  drafts the FSC would administer the issuance regime; the Bank of Korea (BOK) seeks a binding consultative role
  on monetary-sovereignty and foreign-exchange-stability grounds.'
requirement_structured:
  in_force_layer: Virtual Asset User Protection Act (user-protection/market-abuse only)
  pending_layer: Digital Asset Basic Act (issuance regime; not enacted)
  administrator: FSC (under leading drafts)
  central_bank_role: BOK seeks binding consultative role
status: in_force
