interpretation_note: 'ANCHOR / LIVE WINDOW. CLARITY §404 passed Senate Banking 15-9 on 14 May 2026 and awaits floor
  passage. The bona-fide-activity boundary is the open question; the author''s position is that user-initiated routing
  into 1940-Act registered tokenised MMFs falls outside the prohibition because the operative step is the user''s
  signed authorisation, not the holding (see securities_classification + bank_nonbank_routing records).


  [v0.9.5 verification] Confirmed: the Federal Register implementation notice quotes Sec. 4(a)(11) verbatim and
  matches the cell pinpoint. GENIUS is enacted and in force (status corrected proposed->in_force). LIVE DEVELOPMENT
  (Jun 2026): the Senate Banking Committee''s CLARITY substitute (advanced 15-9 on 14 May 2026; placed on the Senate
  Legislative Calendar as Calendar No. 423 on 1 Jun 2026) carries the Tillis-Alsobrooks stablecoin-yield compromise,
  which prohibits digital-asset service providers from offering interest or yield for merely holding a stablecoin
  balance but allows stablecoin rewards and activity-linked incentives. That is the intermediary-layer (CLARITY
  Sec. 404) extension of the GENIUS issuer-level prohibition, and it supports this cell''s standing position that
  user-initiated, activity-linked routing falls outside the holding prohibition. It is not yet law: the bill still
  needs Senate floor passage, reconciliation with the Senate Agriculture and House versions, and signature (see
  the contingent us-clarity-act-enacted event in the time engine).'
interpretive_flag:
  tension: '''bona fide activity'' is undefined in the statute; the issuer-layer ''solely'' and intermediary-layer
    ''economically or functionally equivalent'' comparators leave the routing/market-making carve-out unsettled.'
  resolution_channel: Post-enactment joint SEC/CFTC/Treasury NPRM (12-month window); Senate Banking Committee Report
    as upstream legislative history; SEC Crypto Task Force written-input channel (open now).
