id: us-pss-permitted_activity_yield-001
jurisdiction: US
authority: OCC, FDIC, Fed, Treasury (GENIUS); SEC/CFTC/Treasury joint rulemaking (CLARITY §404, pending)
instrument_type: payment_stablecoin
instrument_label_local: payment stablecoin
dimension: permitted_activity_yield
constraint_ref: C3
requirement_summary: 'GENIUS Act §4(a)(11) prohibits permitted/foreign payment stablecoin issuers from paying any
  form of interest or yield (cash, tokens, or other consideration) to a holder ''solely in connection with the holding,
  use, or retention'' of a payment stablecoin. The word ''solely'' is the textual hinge: it reaches payments tied
  to the act of holding, not payments produced by some other operative event (user-initiated routing, market-making,
  transfers). OCC NPRM §15.10(c)(4) and FDIC NPRM §350.3(b)(4) add a rebuttable presumption that affiliate / related-third-party
  arrangements (including white-label) violate the prohibition, rebuttable by written non-evasion showing; the anti-evasion
  rule (proposed §15.10(c)(6)) treats any sidestep arrangement as a violation. Permitted: merchant-funded discounts;
  issuer profit-sharing with non-affiliated white-label partners without yield pass-through. The intermediary layer
  is the pending CLARITY Act §404, extending the prohibition to ''covered parties'' (digital-asset service providers
  and affiliates) under prongs (A) ''solely in connection with holding'' and (B) ''economically or functionally
  equivalent'' to bank-deposit interest.'
requirement_structured:
  passive_yield_to_holder: prohibited (GENIUS §4(a)(11))
  textual_hinge: '''solely'' (issuer layer) / ''economically or functionally equivalent'' (CLARITY §404(c)(1)(B))'
  activity_based_rewards: permitted in principle; scope TBD by joint SEC/CFTC/Treasury rulemaking
  rulemaking_window: within 12 months of CLARITY enactment
  civil_penalty: up to $5,000,000 per violation (Treasury-assessed)
status: in_force
effective_date: null
