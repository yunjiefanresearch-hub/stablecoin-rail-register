id: kr-frs-monetary_sovereignty-001
jurisdiction: KR
authority: BOK / FSC
instrument_type: fiat_referenced_stablecoin
instrument_label_local: won-referenced stablecoin (draft Digital Asset Basic Act)
dimension: monetary_sovereignty
constraint_ref: C7
requirement_summary: 'No stablecoin-specific monetary-sovereignty regime is in force. DRAFT: cross-border won stablecoins
  would be classified as a foreign-exchange means of payment under the Foreign Exchange Transactions Act, engaging
  the capital-flow management regime. Won FX stability is the backdrop and the monetary-sovereignty contest (the
  central-bank-approval question) is the defining open issue and the principal item stalling the bill.'
requirement_structured:
  in_force_cap: none
  draft: cross-border won stablecoins classified as an FX means of payment (Foreign Exchange Transactions Act)
  backdrop: won FX stability; BOK monetary-sovereignty concerns
  comparator: structurally akin to Brazil's FX-reclassification of the cross-border leg
status: proposed
source:
