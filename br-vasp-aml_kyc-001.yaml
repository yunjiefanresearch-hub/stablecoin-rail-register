interpretation_note: 'Provenance: corridor fieldwork, refined against a primary-source pass (Jun 2026). The Travel
  Rule sits in Art. 44 (rule) + Art. 89 (two-stage phase-in); the domestic stage is Feb 2027 and full international
  compliance is 2 Feb 2028 (confirmed via concordant firm analysis of the Res 520 text, e.g. CSMV). Art. 88 is a
  DISTINCT provision — the authorisation adjustment/transition period (270-day ''período de adequação'') for entities
  already operating at entry into force — and an earlier draft wrongly folded it into the Travel-Rule/AML-controls
  hook; that conflation is corrected here. Travel Rule applies with effectively zero threshold once phased in. Remaining
  clause-level check: the exact subsection of Art. 89 that fixes each stage date.


