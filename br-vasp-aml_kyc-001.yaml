id: br-vasp-aml_kyc-001
jurisdiction: BR
authority: BCB
instrument_type: other
instrument_label_local: ativo virtual (PLD/FT)
dimension: aml_kyc
requirement_summary: 'Res BCB 520 Art. 44 internalises the FATF Travel Rule as a domestic obligation: for each transfer
  the originator''s institution must transmit complete data on the originator (name, CPF/CNPJ, account) and the
  beneficiary, including wallet addresses, plus suspicious-activity reporting and AML/CTF (PLD/FT) governance. Res
  BCB 521 adds Know-Your-Transaction (KYT) duties, requiring identification of self-hosted-wallet owners. Travel-Rule
  implementation is phased over two stages (Art. 89): first domestic transfers between Brazil-established PSAVs
  (by February 2027), then international transfers (full compliance by 2 February 2028); during the phase-in SPSAVs
  may rely on documented client self-declarations. Separately, Art. 88 is the authorisation adjustment/transition
  provision (the 270-day ''período de adequação'' for entities already operating at entry into force), which carries
  general compliance obligations — internal controls, cybersecurity, and Law 13.810/2019 (UN Security Council sanctions)
  screening — but is NOT itself the Travel-Rule hook.'
requirement_structured:
  travel_rule_basis: Res 520 Art. 44; phasing Art. 89
