id: eu-emt-monetary_sovereignty-001
jurisdiction: EU
authority: EBA, ESMA, NCAs
instrument_type: e_money_token
instrument_label_local: non-EU-currency EMT
dimension: monetary_sovereignty
constraint_ref: C7
requirement_summary: For a non-EU-currency EMT, MiCA caps usage as a means of exchange at EUR 200 million per day
  or 1 million transactions per day (the Article 23 thresholds, applied to significant EMTs via Article 58(3)),
  measured on a quarterly-average basis. The cap applies only to use as a means of exchange within a single currency
  area, not to store-of-value use or to trading on crypto-asset venues. A separate reporting obligation triggers
  at EUR 100 million in issuance value globally. This is the canonical quantitative monetary-sovereignty cap and
  the clearest instance of Constraint 7.
requirement_structured:
  cap_type: quantitative
  thresholds:
  - EUR 200,000,000 / day
  - 1,000,000 transactions / day
  measurement: quarterly average
  scope: means of exchange within a single currency area only
  reporting_trigger: EUR 100,000,000 global issuance value
