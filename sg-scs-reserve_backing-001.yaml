id: sg-scs-reserve_backing-001
jurisdiction: SG
authority: MAS
instrument_type: fiat_referenced_stablecoin
instrument_label_local: single-currency stablecoin (SCS)
dimension: reserve_backing
constraint_ref: C2
requirement_summary: SCS reserves must be 100% backed in cash, cash equivalents, or short-term sovereign debt securities
  denominated in the pegged currency, valued at daily mark-to-market, segregated from the issuer's own assets, and
  held with MAS-approved custodians. Reserves are subject to monthly independent attestation and annual external
  audit, with audit reports publicly disclosed.
requirement_structured:
  backing: 100% cash / cash equivalents / short-term sovereign debt in pegged currency
  valuation: daily mark-to-market
  segregation: segregated; MAS-approved custodians
  assurance: monthly attestation + annual external audit, publicly disclosed
status: transitional
effective_date: '2023-08-15'
