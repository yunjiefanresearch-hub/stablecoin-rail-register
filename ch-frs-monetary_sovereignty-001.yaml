id: ch-frs-monetary_sovereignty-001
jurisdiction: CH
authority: FINMA / SNB
instrument_type: fiat_referenced_stablecoin
instrument_label_local: stablecoin (Banking Act; bank-guarantee or licensed-institution pathway)
dimension: monetary_sovereignty
constraint_ref: C7
requirement_summary: 'There is no monetary-sovereignty usage cap: foreign-currency stablecoins are not restricted
  by volume or channel. The practical constraints are the bank-guarantee structure and the AML holder-identification
  requirement, not distribution caps. Switzerland thus sits at the permissive end of the C7 spectrum, in contrast
  to the EU''s Article 23 quantitative cap, the UAE''s onshore channel restriction, and the PRC prohibition.'
requirement_structured:
  usage_cap: none
  foreign_currency_tokens: unrestricted by volume or channel
  practical_constraints: bank-guarantee structure + AML holder identification
  c7_position: permissive end (no cap)
status: in_force
source:
  primary: FINMA Guidance 06/2024 (no usage cap); Banking Act framework
  pinpoint: Monetary sovereignty — no usage cap; foreign-currency tokens unrestricted
  url: https://www.fedlex.admin.ch/eli/cc/2014/273/de
