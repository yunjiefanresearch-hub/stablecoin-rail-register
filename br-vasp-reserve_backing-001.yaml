id: br-vasp-reserve_backing-001
jurisdiction: BR
authority: BCB
instrument_type: fiat_referenced_stablecoin
instrument_label_local: ativo virtual referenciado em moeda fiduciária (stablecoin)
dimension: reserve_backing
constraint_ref: C2
requirement_summary: For a fiat-referenced virtual asset (stablecoin), Res BCB 520/2025 defines the reserve assets
  as the fiduciary currency plus public debt issued by the same governments that issue those currencies (Art. 2,
  III), requires proof of reserves, and prohibits algorithmic reserve control with public disclosure of the criteria
  (Arts. 64+). In force 2 Feb 2026.
requirement_structured:
  algorithmic_stablecoins: prohibited
  unbacked_fiat_pegged_tokens: prohibited
  eligible_reserve_assets:
  - fiat currency
  - public-debt securities
  listing_policy: board-approved; white-paper / code / backing review
status: in_force
effective_date: '2026-02-02'
source:
  primary: Res BCB 520/2025 — stablecoin definition + asset-curation / listing-policy rules
  url: https://www.bcb.gov.br/estabilidadefinanceira/exibenormativo?tipo=Resolução BCB&numero=520
  pinpoint: Res BCB 520/2025 Art. 2, III (reserve assets of a fiat-referenced token = the fiduciary currency and
    public debt issued by the same governments); Arts. 64+ (asset curation; algorithmic-stablecoin prohibition;
    proof of reserves)
secondary:
