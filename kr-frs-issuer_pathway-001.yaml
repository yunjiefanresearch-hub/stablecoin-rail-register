id: kr-frs-issuer_pathway-001
jurisdiction: KR
authority: FSC (would administer)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: won-referenced stablecoin (draft Digital Asset Basic Act)
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: 'No stablecoin issuer is licensed; domestic won-stablecoin issuance is effectively prohibited
  under current law. Future eligibility is contested: the BOK seeks bank-led consortia holding at least fifty-one
  percent; the FSC favours a more fintech-inclusive model. These are draft provisions, not operative law, and reported
  minimum-capital figures diverge across drafts (a press-versus-draft discrepancy) and should be treated as provisional.'
