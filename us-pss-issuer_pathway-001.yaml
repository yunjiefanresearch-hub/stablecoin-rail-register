requirement_summary: 'Permitted payment stablecoin issuers are a defined set: subsidiaries of insured depository
  institutions, federally qualified non-bank payment stablecoin issuers approved by the OCC, and state-qualified
  issuers operating under an OCC-certified comparable state regime. An authorizable private token exists.'
