id: kr-frs-distribution-001
jurisdiction: KR
authority: FSC (would administer)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: won-referenced stablecoin (draft Digital Asset Basic Act)
dimension: distribution
requirement_summary: 'No stablecoin-specific distribution regime is in force. DRAFT: foreign issuers would establish
  a local branch or subsidiary and obtain an FSC licence for payment, redemption, or remittance services, with brokered
  trading permitted on domestic exchanges. Cross-border stablecoins would be classified as a foreign-exchange means
  of payment under the Foreign Exchange Transactions Act.'
requirement_structured:
  in_force: none
  draft_foreign_issuers: local branch/subsidiary + FSC licence for payment/redemption/remittance; brokered trading
