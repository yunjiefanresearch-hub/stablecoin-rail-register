corridor_id: sg-hk-sgd-hkd-settlement
name: Singapore -> Hong Kong SAR (SGD->HKD settlement)
schema: corridor/v3-directed-edge
origin: SG
destination: HK
direction: directed
currencies: SGD -> HKD
feasibility_class: Category I (dual authorization available)
compatibility_category: I/II
compatibility_pair: HK-SG
divergence:
  kind: interaction_sets
  against_pair: HK-SG
  pair_interaction_sets:
  - A
  - F
  edge_interaction_sets: &id001
  - A
  - D
  reason: Directed-edge operative interaction sets (Corridor Atlas v0.2.3 §5, read at the destination
    inbound gate for THIS direction) differ from the undirected pairwise sets (Architecture §5.14). The
    Atlas generalizes the §5.12/§5.14 undirected pairs into directed edges and re-derives the operative
    interaction sets per direction; the compatibility CATEGORY agrees, the interaction-set list may differ
    by direction. This divergence is declared, not silent.
archetypes:
- RC
- SC
- TC
- DC
interaction_sets: *id001
infrastructure_overlap: Project Ensemble + Project Guardian alignment (Hong Kong and Singapore)
inbound_mechanism:
  test: HKMA fiat-referenced-stablecoin licence
  detail: Licence required to issue in Hong Kong or to issue an HKD-referenced token; the first cohort
    is HKD-only and bank-led, so a non-HKD or crypto-native issuer needs a later licence or partnership.
  administrator: HKMA
origin_override:
  flag: origin-egress override
  detail: The June 2025 MAS Digital Token Service Provider statement constrains unlicensed Singapore-based
    operations serving offshore customers, so the origin co-governs an otherwise destination-gated edge.
  administrator: MAS
note: 'The most institutionally supported corridor in the Atlas: MAS and HKMA have a banking-supervision
  MoU and align Project Guardian with Project Ensemble, so the tokenized-asset and digital-financial archetypes
  are unusually live. Even so, a MAS-regulated single-currency stablecoin must be issued in Singapore
  and an HKD product still requires an HKMA licence, so dual authorization remains the baseline despite
  the cooperation.'
source:
  primary: Fan, Cross-Border Digital-Finance Corridor Atlas v0.2.3 (June 2026), §5.5 (Singapore -> Hong
    Kong SAR)
  secondary: 'Fan, Cross-Border Stablecoin Architecture v3 (Twelve Jurisdictions, June 2026), §5.14 (SG
    x HK: Category I/II hybrid — undirected §5.14 pair; see this edge''s `divergence` field)'
valid_as_of: 2026-06
evidence_tier: firm_summary
version_added: 0.5.0
tags:
