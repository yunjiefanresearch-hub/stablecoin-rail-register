id: uk-frs-reserve_backing-001
jurisdiction: UK
authority: FCA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: UK qualifying stablecoin (UKQS)
dimension: reserve_backing
constraint_ref: C2
requirement_summary: SI 2026/102 requires 1:1 backing by a backing-asset pool with annual independent
  review. Backing assets are carved out from the collective-investment-scheme (CIS) and alternative-investment-fund
  (AIF) definitions, with the carve-out activated early ahead of full regime commencement; specific backing-asset
  composition rules are pending final FCA rules.
requirement_structured:
  backing: 1:1 by backing-asset pool
  review: annual independent review
  cis_aif_carveout: backing assets carved out of CIS/AIF definitions (activated early)
  composition: pending final FCA rules
status: transitional
effective_date: '2026-02-01'
source:
  primary: Financial Services and Markets Act 2000 (Cryptoassets) Regulations 2026, SI 2026/102
  pinpoint: 1:1 backing; CIS/AIF carve-out for backing assets
  url: ''
