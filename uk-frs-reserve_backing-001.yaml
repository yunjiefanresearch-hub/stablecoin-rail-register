requirement_summary: SI 2026/102 requires 1:1 backing by a backing-asset pool with annual independent review. Backing
  assets are carved out from the collective-investment-scheme (CIS) and alternative-investment-fund (AIF) definitions,
  with the carve-out activated early ahead of full regime commencement; specific backing-asset composition rules
  are pending final FCA rules.
requirement_structured:
