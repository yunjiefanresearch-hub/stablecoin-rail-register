id: ae-pt-permitted_activity_yield-001
jurisdiction: AE
authority: CBUAE / ADGM-FSRA
instrument_type: payment_stablecoin
instrument_label_local: Payment Token (Dirham Payment Token / Foreign Payment Token)
dimension: permitted_activity_yield
constraint_ref: C3
requirement_summary: Issuer-paid yield is prohibited onshore (CBUAE). ADGM permits the issuer to earn reserve income
  but bans the promotion of the token as an investment or savings product. The operative line in ADGM is promotion,
  not the earning of reserve income — an approach that resembles the US 'solely in connection with holding' analysis
  more than a flat prohibition.
requirement_structured:
  onshore_cbuae: issuer-paid yield prohibited
  adgm: reserve income permitted; promotion as investment/savings product banned
  operative_line_adgm: promotion, not the earning of income
status: in_force
source:
  primary: CBUAE PTSR (Circular 2/2024); ADGM-FSRA FRT framework
  pinpoint: Yield — prohibited onshore; ADGM permits reserve income but bans investment/savings promotion
  url: https://rulebook.centralbank.ae/en/rulebook/payment-token-services-regulation
secondary:
- citation: Fan, Multi-Jurisdiction Stablecoin Compliance Matrix v0.9.6 (June 2026), §United Arab Emirates (Yield
    and Interest Treatment)
- citation: CBUAE Payment Token Services Regulation (Circular 2/2024) — published in English (authoritative) and
    Arabic.
- citation: ADGM permits a yield/promotion-based line (cf. Paxos USDL under ADGM, 2024).
interpretation_note: 'Provenance: transcribed from the author''s Compliance Matrix v0.9.6; VERIFIED against the
  official primary text in the v0.5.1 verification pass (source.url is the official instrument). The onshore/ADGM
  split is the C3 data point for the UAE: ADGM''s promotion-based line is the survey''s closest non-US analogue
  to the GENIUS Act ''solely'' construction.'
interpretive_flag:
  tension: 'The UAE''s split produces a yield asymmetry: onshore prohibits issuer-paid yield while ADGM permits
    reserve income but bans investment/savings promotion; the operative ADGM line is promotion, not the earning
    of income.'
  resolution_channel: CBUAE / ADGM-FSRA supervisory practice; any onshore-vs-free-zone harmonization.
