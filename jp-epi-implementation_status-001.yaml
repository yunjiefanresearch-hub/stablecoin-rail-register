instrument_label_local: Electronic Payment Instrument (EPI)
dimension: implementation_status
requirement_summary: 'Live regime. Milestones: Electronic Payment Instruments regime in force (1 June 2023); USDC
  admitted via the intermediary channel (March 2025); Act No. 66 of 2025 enacted, relaxing trust-type reserves (June
  2025); JPYC Inc. registered as a Type II funds-transfer provider (18 August 2025); JPYC, the first registered
  yen stablecoin, launched (27 October 2025); a megabank trust-structured stablecoin (MUFG, Mizuho, SMBC via Progmat
  and Project Pax) targeted by the end of FY2026 (31 March 2027).'
