id: uk-frs-custody-001
jurisdiction: UK
authority: FCA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: UK qualifying stablecoin (UKQS)
dimension: custody
constraint_ref: C2
requirement_summary: Any firm holding client crypto-assets for more than 24 hours, or with the ability
  to override client authority, is a regulated custodian requiring a safeguarding licence. This 24-hour
  custody rule has significant operational implications for wallet operators with UK user exposure.
requirement_structured:
  trigger: holding client crypto-assets > 24 hours, or ability to override client authority
  consequence: regulated custodian; safeguarding licence required
  impact: wallet operators with UK user exposure
