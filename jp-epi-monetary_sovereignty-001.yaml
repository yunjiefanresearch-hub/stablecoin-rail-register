interpretation_note: 'Provenance: transcribed from the author''s Compliance Matrix v0.9.6; VERIFIED against the
  official primary text in the v0.5.1 verification pass (source.url is the official instrument). Japan''s C7 posture
  is the ''channelled-admission'' model: distinct from the EU cap, the UAE channel restriction, and the PRC prohibition
  — it admits foreign tokens but only through a registered, locally-reserved intermediary.'
