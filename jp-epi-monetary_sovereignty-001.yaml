id: jp-epi-monetary_sovereignty-001
jurisdiction: JP
authority: FSA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: Electronic Payment Instrument (EPI)
dimension: monetary_sovereignty
constraint_ref: C7
requirement_summary: 'There is no aggregate cap. Japan does not prohibit foreign-currency tokens; it admits them
  through a registered Electronic Payment Instruments Exchange Service Provider (EPIESP) that holds reserves in
  Japan equal to customers'' holdings, provided the foreign issuer does not itself issue, redeem, or solicit to
  Japanese users. This is an open-but-channelled monetary-sovereignty posture: the currency-of-denomination is not
  capped, but inbound foreign tokens are routed through a registered domestic intermediary holding local reserves.'
requirement_structured:
  aggregate_cap: none
  foreign_tokens: admitted via registered EPIESP holding reserves in Japan
  issuer_condition: foreign issuer must not issue/redeem/solicit to Japanese users directly
  posture: open-but-channelled
status: in_force
effective_date: '2023-06-01'
source:
