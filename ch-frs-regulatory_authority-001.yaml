id: ch-frs-regulatory_authority-001
jurisdiction: CH
authority: FINMA (primary); SNB (systemic FMIs)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: stablecoin (Banking Act; bank-guarantee or licensed-institution pathway)
dimension: regulatory_authority
requirement_summary: 'Switzerland has no bespoke stablecoin statute: stablecoins are regulated by applying existing
  financial law — the Banking Act and Banking Ordinance (notably Banking Ordinance Art. 5(3)(f), which removes guaranteed
  funds from the deposit definition), the DLT Act and the Financial Market Infrastructure Act (FinMIA), the Collective
  Investment Schemes Act (CISA), and the Anti-Money Laundering Act (AMLA). FINMA Guidance 06/2024 sets out FINMA''s
  supervisory position on stablecoins, including AML treatment and the conditions of the bank-guarantee exemption.
  FINMA is the primary supervisor; the SNB oversees systemic financial market infrastructures.'
requirement_structured:
  approach: no bespoke statute; regulation by application of existing law
  primary_supervisor: FINMA
  systemic_fmi_oversight: SNB
  instruments:
  - Banking Act + Banking Ordinance (Art. 5(3)(f))
  - DLT Act
  - FinMIA
  - CISA
  - AMLA
  - FINMA Guidance 06/2024
status: in_force
