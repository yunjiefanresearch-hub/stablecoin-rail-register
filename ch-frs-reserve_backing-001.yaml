id: ch-frs-reserve_backing-001
jurisdiction: CH
authority: FINMA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: stablecoin (Banking Act; bank-guarantee or licensed-institution pathway)
dimension: reserve_backing
constraint_ref: C2
requirement_summary: 'There is no statutory reserve schedule (no mandated asset list or percentages). Under the
  bank-guarantee pathway the protective mechanism is the guarantee, not a prescribed reserve portfolio: the guarantee
  must cover the principal plus interest of the deposited funds. If the arrangement is structured so that assets
  are held for the account of holders (rather than as a claim against the issuer), collective investment scheme
  (CIS) rules under CISA may apply.'
requirement_structured:
  statutory_reserve_schedule: none
  protective_mechanism: bank default guarantee covering principal + interest
  cis_risk: CISA may apply if assets are held for the account of holders
status: in_force
source:
