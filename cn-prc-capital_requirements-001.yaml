requirement_summary: Capital requirements are not applicable to domestic issuance. On the indirect Hong
  Kong pathway, the HKMA HK$25 million paid-up share capital applies to the HK-licensed entity; for PRC-listed
  parents, capital injected into the HK subsidiary is subject to SAFE outbound-investment registration
  and consolidates into the parent's financial statements under the Accounting Standards for Business
  Enterprises.
