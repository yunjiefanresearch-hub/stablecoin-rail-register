id: sg-scs-securities_classification-001
jurisdiction: SG
authority: MAS
instrument_type: fiat_referenced_stablecoin
instrument_label_local: single-currency stablecoin (SCS)
dimension: securities_classification
constraint_ref: C4
requirement_summary: 'Token classification follows MAS''s substance-over-form test: a token with capital-markets-product
  characteristics is regulated under the Securities and Futures Act (SFA), not the Payment Services Act,
  and falls outside the SCS framework entirely. Tokens marketed as offering yield or as investments would
  likely be classified as securities under the SFA. The destination-product classification analysis governs
  whether a routing architecture that converts SCS holdings into SFA-regulated capital-markets-product
  shares is permissible.'
