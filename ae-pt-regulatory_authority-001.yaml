id: ae-pt-regulatory_authority-001
jurisdiction: AE
authority: CBUAE (onshore); VARA / ADGM-FSRA / DIFC-DFSA (free zones)
instrument_type: payment_stablecoin
instrument_label_local: Payment Token (Dirham Payment Token / Foreign Payment Token)
dimension: regulatory_authority
requirement_summary: 'The UAE operates a federal-versus-free-zone split. Onshore, the Central Bank of the UAE (CBUAE)
  Payment Token Services Regulation (PTSR, Circular 2/2024) governs payment-token issuance and use. The financial
  free zones run their own fiat-referenced-token regimes: VARA (Dubai, outside the DIFC); the ADGM Financial Services
  Regulatory Authority (FSRA) under its Fiat-Referenced Token (FRT) framework; and the DIFC''s Dubai Financial Services
  Authority (DFSA) under its Crypto Token rules.'
requirement_structured:
  split: federal (onshore) vs financial free zones
  onshore: CBUAE PTSR (Circular 2/2024)
  free_zones:
  - VARA (Dubai ex-DIFC)
  - ADGM-FSRA (FRT framework)
  - DIFC-DFSA (Crypto Token rules)
status: in_force
