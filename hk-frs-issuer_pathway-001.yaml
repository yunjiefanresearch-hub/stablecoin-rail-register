id: hk-frs-issuer_pathway-001
jurisdiction: HK
authority: HKMA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: specified stablecoin
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: A licence is required for (1) FRS issuers in Hong Kong, (2) issuers outside HK of stablecoins
  referencing the HK dollar, and (3) entities actively marketing FRS to the HK public. Eligible applicants are companies
  incorporated in HK under the Companies Ordinance, or authorised institutions (banks / restricted-licence / deposit-taking
  companies under the Banking Ordinance). Shell entities or mere pre-1-Aug-2025 establishment do not qualify for
  transitional treatment. The first-licence cohort (10 Apr 2026) was HSBC and Anchorpoint Financial Limited (a Standard
  Chartered (HK)–HKT–Animoca JV intending HKDAP on a B2B2C model); no PRC-connected entities were licensed.
