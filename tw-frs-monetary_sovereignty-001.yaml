id: tw-frs-monetary_sovereignty-001
jurisdiction: TW
authority: CBC (central bank)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: virtual asset / draft stablecoin (Virtual Asset Service Act)
dimension: monetary_sovereignty
constraint_ref: C7
requirement_summary: No stablecoin-specific monetary-sovereignty regime is in force. The backdrop is the central
  bank's control of the NTD and the offshore-NTD posture; the peg currency for a future Taiwan stablecoin (NTD vs
  USD) is officially undecided. A NTD-pegged stablecoin engages the central bank's monetary-sovereignty concerns
  directly; a USD-pegged stablecoin engages offshore-NTD and capital-flow concerns. The choice is the central monetary-sovereignty
  question for Taiwan.
requirement_structured:
  in_force_cap: none
  backdrop: CBC control of NTD; offshore-NTD posture
  peg_currency: officially undecided (NTD vs USD)
  ntd_peg: engages monetary-sovereignty concerns directly
  usd_peg: engages offshore-NTD and capital-flow concerns
status: proposed
source:
  primary: CBC public statements; draft Virtual Asset Service Act
  pinpoint: Monetary sovereignty — peg currency undecided (NTD vs USD); NTD offshore controls are the backdrop
  url: https://english.ey.gov.tw/
